name: Web E2E Smoke

on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/web/**"
      - "apps/api/**"
      - "supabase/**"
      - "docker-compose.yml"
      - ".env.example"
      - ".github/workflows/web-e2e-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-e2e-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SUPABASE_CLI_VERSION: 2.78.1

jobs:
  smoke:
    name: Auth Chat Billing smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache Playwright browser binaries
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Install Playwright browser dependencies
        run: pnpm --filter @hive/web exec playwright install --with-deps chromium

      - name: Start local Supabase CLI stack
        run: npx supabase@${SUPABASE_CLI_VERSION} start

      - name: Reset local Supabase schema from repo migrations
        run: npx supabase@${SUPABASE_CLI_VERSION} db reset --yes

      - name: Export local Supabase env
        shell: bash
        run: |
          set -a
          source <(npx supabase@${SUPABASE_CLI_VERSION} status -o env)
          set +a
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> "$GITHUB_ENV"
          echo "E2E_SUPABASE_ANON_KEY=$ANON_KEY" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> "$GITHUB_ENV"

      - name: Start docker support services
        run: docker compose up -d redis langfuse-db langfuse ollama

      - name: Pull local zero-cost guest model for smoke
        env:
          OLLAMA_SMOKE_MODEL: qwen2.5:0.5b
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:11434/api/tags >/dev/null; then
              break
            fi
            sleep 2
          done
          docker compose exec -T ollama ollama pull "$OLLAMA_SMOKE_MODEL"

      - name: Start docker app stack with zero-cost guest model
        env:
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8080
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          INTERNAL_API_BASE_URL: http://api:8080
          OLLAMA_BASE_URL: http://ollama:11434
          OLLAMA_MODEL: qwen2.5:0.5b
          OLLAMA_FREE_MODEL: qwen2.5:0.5b
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}
          WEB_INTERNAL_GUEST_TOKEN: dev-web-guest-token
        run: docker compose up --build -d api web --no-deps

      - name: Wait for Supabase, API, and web readiness
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:54321/auth/v1/health >/dev/null && curl -fsS http://127.0.0.1:8080/health >/dev/null && curl -fsSL http://127.0.0.1:3000/auth >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Timed out waiting for services"
          docker compose ps
          exit 1

      - name: Run web smoke e2e
        env:
          E2E_BASE_URL: http://127.0.0.1:3000
          E2E_API_BASE_URL: http://127.0.0.1:8080
          E2E_SUPABASE_ANON_KEY: ${{ env.E2E_SUPABASE_ANON_KEY }}
        run: pnpm --filter @hive/web test:e2e -- e2e/smoke-auth-chat-billing.spec.ts

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          retention-days: 7
          path: |
            apps/web/playwright-report
            apps/web/test-results

      - name: Stop docker stack
        if: always()
        run: docker compose down -v

      - name: Stop local Supabase CLI stack
        if: always()
        run: npx supabase@${SUPABASE_CLI_VERSION} stop --no-backup
