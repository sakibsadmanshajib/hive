name: Web E2E Smoke

on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/web/**"
      - "apps/api/**"
      - "docker-compose.yml"
      - ".github/workflows/web-e2e-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-e2e-smoke-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Auth Chat Billing smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache Playwright browser binaries
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Checkpoint cache snapshot
        run: echo "Playwright cache hit: ${{ steps.cache-playwright.outputs.cache-hit }}"

      - name: Install Playwright browser dependencies
        run: pnpm --filter @hive/web exec playwright install --with-deps chromium

      - name: Start docker stack
        run: docker compose up --build -d

      - name: Wait for API and web readiness
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null && curl -fsSL http://127.0.0.1:3000/auth >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Timed out waiting for services"
          docker compose ps
          exit 1

      - name: Run web smoke e2e
        env:
          E2E_BASE_URL: http://127.0.0.1:3000
          E2E_API_BASE_URL: http://127.0.0.1:8080
        run: pnpm --filter @hive/web test:e2e -- e2e/smoke-auth-chat-billing.spec.ts

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          retention-days: 7
          path: |
            apps/web/playwright-report
            apps/web/test-results

      - name: Stop docker stack
        if: always()
        run: docker compose down -v
