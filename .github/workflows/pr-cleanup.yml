name: PR Cleanup

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: cleanup-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cleanup:
    name: Post-merge cleanup
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run post-merge cleanup script
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: .github/scripts/pr-cleanup.sh
