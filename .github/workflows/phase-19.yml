name: phase-19

on:
  push:
    branches:
      - main
      - 'b/phase-19-**'
      - 'b/phase-2*-**'
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'deploy/**'
      - 'supabase/migrations/**'
      - 'tools/**'
      - '.github/workflows/phase-19.yml'
      - 'docs/superpowers/specs/2026-05-16-phase-19-**'
      - 'docs/superpowers/plans/2026-05-16-phase-19-**'
  pull_request:
    branches: [main]

concurrency:
  group: phase-19-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-tests:
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      HIVE_TEST_DB_URL: postgres://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Bootstrap Supabase-managed objects
        run: |
          # The pgvector service image is plain Postgres — it does not
          # ship the Supabase-managed `auth` schema/roles. Stub them so
          # the migrations can run unmodified.
          psql "$HIVE_TEST_DB_URL" -v ON_ERROR_STOP=1 \
            -f .github/workflows/scripts/phase-19-ci-bootstrap.sql
      - name: Apply migrations
        run: |
          # Apply every migration in filename-sort order so Phase 19 tables
          # have all their dependencies (auth.users, hive_app role, etc.)
          # in place. Filtering by date prefix produced cascading "current
          # transaction aborted" errors when an earlier-than-Phase-19
          # migration was missing.
          set -e
          if compgen -G "supabase/migrations/*.sql" > /dev/null; then
            for f in $(ls -1 supabase/migrations/*.sql | sort); do
              psql "$HIVE_TEST_DB_URL" -v ON_ERROR_STOP=1 -f "$f"
            done
          fi
      - name: Run Phase 19 Go tests
        run: |
          # Scope this job to the Plan-04 compliance suite. The broader
          # `./apps/control-plane/...` and `./apps/edge-api/...` packages
          # are already covered by the main CI workflow's per-app jobs.
          # Running them here against the bootstrapped pgvector image
          # surfaces pre-existing SERIALIZABLE-isolation flakes and
          # Resolver tests that depend on objects the bootstrap does
          # not stub — those belong in the per-app CI lane, not in the
          # phase-19 lane that exists to gate Plan-04's new surfaces.
          go test \
            ./apps/control-plane/tests/compliance/... \
            -race -count=1 -short -buildvcs=false

  lints:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci --ignore-scripts || npm install --ignore-scripts
      - run: npm run lint:tenant-setting
      - run: npm run lint:tenant-id
      - run: npm run lint:audit-write

  playwright:
    runs-on: ubuntu-22.04
    needs: [go-tests, lints]
    # Playwright requires real OAuth accounts + a populated Supabase DB
    # and provisioned `.env.ci` — see docs/onboarding/phase-19-dev-setup.md.
    # Gate the job on the `ci:e2e` label so PRs that haven't been wired
    # to the secret set don't fail on missing env, while still allowing
    # an opt-in dry-run on demand.
    if: ${{ (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ci:e2e')) || github.ref == 'refs/heads/main' }}
    env:
      HIVE_TEST_DB_URL: ${{ secrets.HIVE_TEST_DB_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_OAUTH_CLIENT_ID: ${{ secrets.SUPABASE_OAUTH_CLIENT_ID }}
      SUPABASE_OAUTH_CLIENT_SECRET: ${{ secrets.SUPABASE_OAUTH_CLIENT_SECRET }}
      OWUI_URL: http://localhost:3003
      CONTROL_PLANE_URL: http://localhost:8081
      EDGE_API_URL: http://localhost:8080
      HIVE_CHAT_URL: http://localhost:3003
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      E2E_USER_A_EMAIL: ${{ secrets.E2E_USER_A_EMAIL }}
      E2E_USER_A_PASSWORD: ${{ secrets.E2E_USER_A_PASSWORD }}
      E2E_USER_B_EMAIL: ${{ secrets.E2E_USER_B_EMAIL }}
      E2E_USER_B_PASSWORD: ${{ secrets.E2E_USER_B_PASSWORD }}
      E2E_TENANT_B_ID: ${{ secrets.E2E_TENANT_B_ID }}
      E2E_USER_A_SECOND_TENANT_ID: ${{ secrets.E2E_USER_A_SECOND_TENANT_ID }}
      E2E_ORPHAN_JWT: ${{ secrets.E2E_ORPHAN_JWT }}
      E2E_EXPIRED_JWT: ${{ secrets.E2E_EXPIRED_JWT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Boot stack
        run: |
          cd deploy/docker
          docker compose --env-file ../../.env.ci --profile local --profile test up -d --build
          healthy=0
          for i in $(seq 1 60); do
            if curl -fsSL http://localhost:8080/health \
               && curl -fsSL http://localhost:8081/health \
               && curl -fsSL http://localhost:3003/health; then
              healthy=1
              break
            fi
            sleep 2
          done
          if [ "$healthy" -ne 1 ]; then
            echo "stack failed to become healthy within 120s"
            docker compose ps
            exit 1
          fi
      - name: Install pnpm + Playwright
        run: |
          npm i -g pnpm@9
          cd apps/web-console
          pnpm install
          # pg is a soft-runtime dep used only by specs that assert on
          # audit_log rows; keep it out of package.json so the workspace
          # build doesn't carry a postgres driver.
          pnpm add --save-dev --ignore-workspace pg
          pnpm exec playwright install --with-deps chromium
      - name: Run Phase 19 Playwright
        run: |
          cd apps/web-console
          pnpm e2e:phase-19
      - name: SOC2 coverage report
        if: always()
        run: |
          npm i --no-save yaml pg
          node tools/soc2-coverage-report.mjs || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web-console/playwright-report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: soc2-coverage
          path: docs/compliance/SOC2-LOG-COVERAGE.md
      - name: Compose logs
        if: failure()
        run: |
          cd deploy/docker
          docker compose logs --no-color > compose-logs.txt
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: compose-logs
          path: deploy/docker/compose-logs.txt
