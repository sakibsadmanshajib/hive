name: deploy-staging

on:
  push:
    branches:
      - main
    paths:
      - 'apps/edge-api/**'
      - 'apps/control-plane/**'
      - 'apps/web-console/**'
      - 'packages/**'
      - 'deploy/docker/**'
      - 'deploy/litellm/**'
      - '.github/workflows/deploy-staging.yml'
  schedule:
    # Hourly — `detect-changes` job skips deploy if no diff vs last successful run
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  detect-changes:
    name: Detect changes vs last successful deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT: ${{ github.event_name }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          # push + workflow_dispatch: always deploy (paths filter already applies to push)
          if [ "$EVENT" != "schedule" ]; then
            echo "should_deploy=true"  >> "$GITHUB_OUTPUT"
            echo "reason=non-cron ($EVENT)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Cron: only deploy if watched paths changed vs the SHA of the last
          # successful deploy-staging run. If no prior run recorded, deploy once.
          last_sha=$(gh run list \
              --workflow=deploy-staging.yml \
              --branch=main \
              --status=success \
              --limit=1 \
              --json headSha \
              --jq '.[0].headSha // ""')

          if [ -z "$last_sha" ]; then
            echo "should_deploy=true"  >> "$GITHUB_OUTPUT"
            echo "reason=no prior successful deploy"  >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$last_sha" = "$HEAD_SHA" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "reason=HEAD == last_deploy_sha ($last_sha)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Make sure we have the last-deploy SHA locally so git diff can resolve it.
          git fetch --quiet origin "$last_sha" || true

          if git diff --quiet "$last_sha" "$HEAD_SHA" -- \
              apps packages deploy/docker deploy/litellm \
              .github/workflows/deploy-staging.yml; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "reason=no diff in watched paths since $last_sha" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=true"  >> "$GITHUB_OUTPUT"
            echo "reason=diff detected since $last_sha"  >> "$GITHUB_OUTPUT"
          fi

      - name: Log decision
        run: echo "should_deploy=${{ steps.check.outputs.should_deploy }} reason='${{ steps.check.outputs.reason }}'"

  build-images:
    name: Build & push Go images
    needs: detect-changes
    if: needs.detect-changes.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component: [edge-api, control-plane]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.${{ matrix.component }}.prod
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.component }}:main
            ${{ env.IMAGE_PREFIX }}/${{ matrix.component }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,scope=${{ matrix.component }},mode=max

  deploy-vm:
    name: Deploy to OCI VM
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Seed staging env
        env:
          STAGING_ENV: ${{ secrets.STAGING_ENV }}
          STAGING_REDIS_URL: ${{ secrets.STAGING_REDIS_URL }}
        run: |
          printf '%s' "$STAGING_ENV" > /tmp/hive.env
          chmod 600 /tmp/hive.env

          # REDIS_URL is sourced from a dedicated secret (STAGING_REDIS_URL)
          # so staging-only managed-Redis credentials can be rotated without
          # rewriting the full STAGING_ENV blob. Any REDIS_URL line baked
          # into STAGING_ENV is overridden here.
          if [ -z "${STAGING_REDIS_URL:-}" ]; then
            echo "FATAL: STAGING_REDIS_URL secret is empty or unset." >&2
            rm -f /tmp/hive.env
            exit 1
          fi
          # Strip any existing REDIS_URL= lines, then append the canonical one.
          grep -vE '^REDIS_URL=' /tmp/hive.env > /tmp/hive.env.tmp || true
          mv /tmp/hive.env.tmp /tmp/hive.env
          printf 'REDIS_URL=%s\n' "$STAGING_REDIS_URL" >> /tmp/hive.env
          chmod 600 /tmp/hive.env

          # Defensive: staging must use a managed Redis (Upstash, Redis
          # Cloud, etc.), never the local docker container. The base
          # compose `redis` service is gated to `--profile local` and the
          # staging override drops the depends_on, but we assert here too
          # so a copy-paste mistake in the STAGING_REDIS_URL secret can't
          # silently route writes to a non-existent localhost redis.
          # Hostname token must be bounded by `:` `/` or end-of-line so
          # legitimate managed hostnames like `redis-19287.foo.cloud` are
          # not falsely flagged as the docker `redis` service name.
          if grep -E '^REDIS_URL=rediss?://([^@]*@)?(redis|localhost|127\.0\.0\.1)(:|/|$)' /tmp/hive.env; then
            echo "FATAL: STAGING_REDIS_URL points at a docker/local redis." >&2
            echo "Staging must use a managed Redis (e.g. redis://default:<token>@<host>:<port>)." >&2
            rm -f /tmp/hive.env
            exit 1
          fi
          if ! grep -qE '^REDIS_URL=' /tmp/hive.env; then
            echo "FATAL: REDIS_URL injection failed (no REDIS_URL line in /tmp/hive.env)." >&2
            rm -f /tmp/hive.env
            exit 1
          fi

          scp -i ~/.ssh/id_ed25519 /tmp/hive.env \
            deploy@${{ secrets.STAGING_HOST }}:/opt/hive/.env
          ssh -i ~/.ssh/id_ed25519 deploy@${{ secrets.STAGING_HOST }} \
            'chmod 600 /opt/hive/.env'
          rm -f /tmp/hive.env

      - name: Sync compose + litellm config
        run: |
          scp -i ~/.ssh/id_ed25519 \
            deploy/docker/docker-compose.yml \
            deploy/docker/docker-compose.staging.yml \
            deploy@${{ secrets.STAGING_HOST }}:/opt/hive/deploy/docker/
          scp -i ~/.ssh/id_ed25519 \
            deploy/litellm/config.yaml \
            deploy@${{ secrets.STAGING_HOST }}:/opt/hive/deploy/litellm/config.yaml

      - name: Pull & restart stack
        env:
          GHCR_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_TAG: ${{ github.sha }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        run: |
          # Generate the remote script with token + tag substituted locally so
          # they never appear in the VM process environment (/proc/<pid>/environ).
          # Unquoted heredoc delimiter expands $VARS on the runner; literal `$`s
          # for the remote shell are escaped with \$ where needed.
          ssh -i ~/.ssh/id_ed25519 deploy@${{ secrets.STAGING_HOST }} 'bash -s' <<SH
          set -euo pipefail
          cd /opt/hive/deploy/docker
          printf '%s' '${GHCR_TOKEN}' | docker login ghcr.io -u '${GHCR_ACTOR}' --password-stdin
          # Persist the deployed tag so any manual \`docker compose\` invocation
          # on the VM resolves IMAGE_TAG without re-running the workflow.
          grep -vE '^(IMAGE_TAG|IMAGE_PREFIX)=' /opt/hive/.env > /opt/hive/.env.tmp || true
          printf 'IMAGE_TAG=%s\nIMAGE_PREFIX=%s\n' '${IMAGE_TAG}' '${IMAGE_PREFIX}' >> /opt/hive/.env.tmp
          mv /opt/hive/.env.tmp /opt/hive/.env
          chmod 600 /opt/hive/.env
          docker compose -f docker-compose.yml -f docker-compose.staging.yml --env-file /opt/hive/.env pull edge-api control-plane litellm
          docker compose -f docker-compose.yml -f docker-compose.staging.yml --env-file /opt/hive/.env up -d --remove-orphans edge-api control-plane litellm
          docker image prune -f
          docker logout ghcr.io
          SH

      - name: Smoke test
        run: |
          for i in $(seq 1 12); do
            api_ok=0; cp_ok=0
            curl -fsS https://api-hive.scubed.co/health >/dev/null && api_ok=1 || true
            curl -fsS https://cp-hive.scubed.co/health  >/dev/null && cp_ok=1 || true
            if [ "$api_ok" = 1 ] && [ "$cp_ok" = 1 ]; then
              echo "SMOKE OK"
              exit 0
            fi
            echo "attempt $i failed (api=$api_ok, cp=$cp_ok), retry in 10s"
            sleep 10
          done
          echo "SMOKE FAIL"
          exit 1

  sdk-replay:
    name: SDK replay against staging URL
    needs: [detect-changes, deploy-vm]
    if: needs.detect-changes.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      HIVE_BASE_URL: https://api-hive.scubed.co/v1
      HIVE_API_KEY: ${{ secrets.HIVE_API_KEY }}
      HIVE_TEST_MODEL: hive-default
      HIVE_EMBEDDING_MODEL: hive-embedding-default
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Assert model catalog
        run: |
          set -euo pipefail
          body="$(curl -fsS -H "Authorization: Bearer $HIVE_API_KEY" "$HIVE_BASE_URL/models")"
          echo "$body" | jq -e '.data | length >= 4' >/dev/null
          for alias in hive-auto hive-default hive-embedding-default hive-fast; do
            echo "$body" | jq -e --arg id "$alias" '.data | map(.id) | index($id) != null' >/dev/null \
              || { echo "missing alias: $alias"; exit 1; }
          done
          echo "catalog OK"

      - name: Install JS sdk-tests deps
        working-directory: packages/sdk-tests/js
        run: npm install --no-audit --no-fund

      - name: Run JS chat-completions replay
        working-directory: packages/sdk-tests/js
        run: npx vitest run tests/chat-completions

      - name: Install Python sdk-tests deps
        working-directory: packages/sdk-tests/python
        run: pip install -e '.[dev]'

      - name: Run Python health/models/embeddings replay
        working-directory: packages/sdk-tests/python
        run: pytest tests/test_health.py tests/test_models.py tests/test_embeddings.py -q

  deploy-workers:
    name: Deploy web-console to Cloudflare Workers (OpenNext)
    needs: deploy-vm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-console
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web-console/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build (OpenNext for Cloudflare Workers)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: https://api-hive.scubed.co
          NEXT_PUBLIC_CONTROL_PLANE_URL: https://cp-hive.scubed.co
        run: npm run build:cf

      - name: Populate OpenNext incremental cache (no-op without R2)
        # Run in a real shell so the `|| true` bash short-circuit applies.
        # The cloudflare/wrangler-action `preCommands` field is exec'd
        # token-by-token, which made `|| true` get parsed as positional
        # args and emit "ERROR Too many non-option arguments: got 2".
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx opennextjs-cloudflare populateCache --target remote || true

      - name: Deploy to CF Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web-console
          command: deploy
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: https://api-hive.scubed.co
          NEXT_PUBLIC_CONTROL_PLANE_URL: https://cp-hive.scubed.co
