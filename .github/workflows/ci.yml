name: Monorepo Quality CI

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed scopes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'apps/api/**'
            web:
              - 'apps/web/**'
            shared:
              - 'packages/**'
            root:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - '.github/workflows/**'
              - '.github/scripts/**'

      - name: Compute execution plan
        id: scope
        run: |
          run_api="false"
          run_web="false"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            run_api="true"
            run_web="true"
          fi

          if [[ "${{ steps.changes.outputs.api }}" == "true" || "${{ steps.changes.outputs.shared }}" == "true" || "${{ steps.changes.outputs.root }}" == "true" ]]; then
            run_api="true"
          fi

          if [[ "${{ steps.changes.outputs.web }}" == "true" || "${{ steps.changes.outputs.shared }}" == "true" || "${{ steps.changes.outputs.root }}" == "true" ]]; then
            run_web="true"
          fi

          echo "run_api=$run_api" >> "$GITHUB_OUTPUT"
          echo "run_web=$run_web" >> "$GITHUB_OUTPUT"

      - name: Checkpoint plan
        run: |
          echo "API checks: ${{ steps.scope.outputs.run_api }}"
          echo "Web checks: ${{ steps.scope.outputs.run_web }}"

      - name: Setup pnpm
        if: steps.scope.outputs.run_api == 'true' || steps.scope.outputs.run_web == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        if: steps.scope.outputs.run_api == 'true' || steps.scope.outputs.run_web == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache Next.js build cache
        if: steps.scope.outputs.run_web == 'true'
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/src/**', 'apps/web/public/**', 'apps/web/next.config.*', 'apps/web/tsconfig*.json', 'apps/web/package.json') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/src/**', 'apps/web/public/**', 'apps/web/next.config.*', 'apps/web/tsconfig*.json', 'apps/web/package.json') }}-
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install dependencies
        if: steps.scope.outputs.run_api == 'true' || steps.scope.outputs.run_web == 'true'
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Lint API
        if: steps.scope.outputs.run_api == 'true'
        run: pnpm --filter @hive/api lint

      - name: Lint web
        if: steps.scope.outputs.run_web == 'true'
        run: pnpm --filter @hive/web lint

      - name: Test API
        if: steps.scope.outputs.run_api == 'true'
        run: pnpm --filter @hive/api test

      - name: Test web
        if: steps.scope.outputs.run_web == 'true'
        run: pnpm --filter @hive/web test

      - name: Build API
        if: steps.scope.outputs.run_api == 'true'
        run: pnpm --filter @hive/api build

      - name: Build web
        if: steps.scope.outputs.run_web == 'true'
        run: pnpm --filter @hive/web build

      - name: No-op when no relevant source changed
        if: steps.scope.outputs.run_api != 'true' && steps.scope.outputs.run_web != 'true'
        run: echo "No API/web/shared/root source changes detected; skipping quality checks."
