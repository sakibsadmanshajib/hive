name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go-tests:
    name: Go tests (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: edge-api
            path: ./apps/edge-api
          - module: control-plane
            path: ./apps/control-plane
          - module: storage
            path: ./packages/storage
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: |
            apps/edge-api/go.sum
            apps/control-plane/go.sum
            packages/storage/go.sum

      - name: Download modules
        working-directory: ${{ matrix.path }}
        run: go mod download

      - name: go vet
        working-directory: ${{ matrix.path }}
        run: go vet ./...

      - name: go test
        working-directory: ${{ matrix.path }}
        run: go test -count=1 -short -race -timeout 5m ./...

  web-unit:
    name: Web console (type + unit + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-console
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web-console/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests (vitest)
        run: npm run test:unit

      - name: Build (Next.js)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key

  docker-build:
    name: Docker build smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build edge-api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.edge-api
          push: false
          cache-from: type=gha,scope=edge-api
          cache-to: type=gha,scope=edge-api,mode=max

      - name: Build control-plane image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.control-plane
          push: false
          cache-from: type=gha,scope=control-plane
          cache-to: type=gha,scope=control-plane,mode=max

      - name: Build web-console image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.web-console
          push: false
          cache-from: type=gha,scope=web-console
          cache-to: type=gha,scope=web-console,mode=max

  live-integration:
    name: Live integration (SDK tests + smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Secrets only exposed for same-repo push or same-repo PR — never forks
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    needs: [go-tests, web-unit]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Compose .env from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_BUCKET_FILES: ${{ secrets.S3_BUCKET_FILES }}
          S3_BUCKET_IMAGES: ${{ secrets.S3_BUCKET_IMAGES }}
          LITELLM_MASTER_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
          HIVE_API_KEY: ${{ secrets.HIVE_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          OPENROUTER_DEFAULT_MODEL: ${{ vars.OPENROUTER_DEFAULT_MODEL }}
          OPENROUTER_AUTO_MODEL: ${{ vars.OPENROUTER_AUTO_MODEL }}
          OPENROUTER_FAST_FALLBACK_MODEL: ${{ vars.OPENROUTER_FAST_FALLBACK_MODEL }}
          GROQ_FAST_MODEL: ${{ vars.GROQ_FAST_MODEL }}
        run: |
          cat > .env <<ENV
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
          SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY
          SUPABASE_DB_URL=postgresql://$SUPABASE_DB_USER:$SUPABASE_DB_PASSWORD@$SUPABASE_DB_HOST:$SUPABASE_DB_PORT/$SUPABASE_DB_NAME
          REDIS_URL=redis://redis:6379/0
          CONTROL_PLANE_PORT=8081
          CONTROL_PLANE_BASE_URL=http://localhost:8081
          EDGE_CONTROL_PLANE_BASE_URL=http://control-plane:8081
          LITELLM_MASTER_KEY=$LITELLM_MASTER_KEY
          OPENROUTER_API_KEY=$OPENROUTER_API_KEY
          GROQ_API_KEY=$GROQ_API_KEY
          OPENROUTER_DEFAULT_MODEL=$OPENROUTER_DEFAULT_MODEL
          OPENROUTER_AUTO_MODEL=$OPENROUTER_AUTO_MODEL
          OPENROUTER_FAST_FALLBACK_MODEL=$OPENROUTER_FAST_FALLBACK_MODEL
          GROQ_FAST_MODEL=$GROQ_FAST_MODEL
          S3_ENDPOINT=$S3_ENDPOINT
          S3_ACCESS_KEY=$S3_ACCESS_KEY
          S3_SECRET_KEY=$S3_SECRET_KEY
          S3_REGION=$S3_REGION
          S3_USE_SSL=true
          S3_BUCKET_FILES=$S3_BUCKET_FILES
          S3_BUCKET_IMAGES=$S3_BUCKET_IMAGES
          NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL
          NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY
          NEXT_PUBLIC_APP_URL=http://localhost:3000
          HIVE_API_KEY=$HIVE_API_KEY
          ENV

      - name: Start core stack
        working-directory: deploy/docker
        run: |
          docker compose --env-file ../../.env up -d --build \
            redis litellm control-plane edge-api

      - name: Wait for services to become healthy
        working-directory: deploy/docker
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 300 ))
          for svc in control-plane edge-api; do
            echo "waiting for $svc..."
            while :; do
              state=$(docker inspect --format '{{.State.Health.Status}}' "$(docker compose ps -q $svc)" 2>/dev/null || echo "starting")
              if [ "$state" = "healthy" ]; then
                echo "$svc: healthy"
                break
              fi
              if [ "$(date +%s)" -gt "$deadline" ]; then
                echo "::error::$svc did not become healthy within timeout (last state: $state)"
                docker compose logs --tail=200
                exit 1
              fi
              sleep 5
            done
          done

      - name: Smoke test — /health endpoints
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS http://localhost:8080/health | tee /tmp/edge-health.json
          echo
          curl -fsS http://localhost:8081/health | tee /tmp/cp-health.json

      - name: Smoke test — /v1/models via edge-api
        shell: bash
        env:
          HIVE_API_KEY: ${{ secrets.HIVE_API_KEY }}
        run: |
          set -euo pipefail
          echo "HIVE_API_KEY length in workflow env: ${#HIVE_API_KEY}"
          code=$(curl -sS -o /tmp/models.json -w "%{http_code}" \
            http://localhost:8080/v1/models \
            -H "Authorization: Bearer $HIVE_API_KEY")
          echo "HTTP $code"
          if [ "$code" != "200" ]; then
            echo "::error::/v1/models returned $code"
            cat /tmp/models.json || true
            exit 1
          fi
          head -c 200 /tmp/models.json; echo

      - name: Run SDK integration tests (JS + Python + Java)
        working-directory: deploy/docker
        env:
          # Pass through as process env so docker compose substitution picks it up
          # even if .env parsing differs between runners.
          HIVE_API_KEY: ${{ secrets.HIVE_API_KEY }}
        run: |
          # Diagnostic: confirm HIVE_API_KEY reaches the sdk-tests-js container
          docker compose --env-file ../../.env --profile test run --rm \
            --no-deps sdk-tests-js \
            sh -c 'printf "sdk container sees HIVE_API_KEY of length %d\n" "${#HIVE_API_KEY}"'

          # Each sdk-tests-* container runs its suite then exits.
          # --abort-on-container-exit returns non-zero if any test container fails.
          docker compose --env-file ../../.env --profile test up --build \
            --abort-on-container-exit --exit-code-from sdk-tests-js sdk-tests-js
          docker compose --env-file ../../.env --profile test up --build \
            --abort-on-container-exit --exit-code-from sdk-tests-py sdk-tests-py
          docker compose --env-file ../../.env --profile test up --build \
            --abort-on-container-exit --exit-code-from sdk-tests-java sdk-tests-java

      - name: Dump compose logs on failure
        if: failure()
        working-directory: deploy/docker
        run: docker compose --env-file ../../.env logs --no-color --timestamps --tail=500 > /tmp/compose.log || true

      - name: Upload compose logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs
          path: /tmp/compose.log
          if-no-files-found: ignore

      - name: Tear down stack
        if: always()
        working-directory: deploy/docker
        run: docker compose --env-file ../../.env down -v --remove-orphans || true

  web-e2e:
    name: Web E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    needs: [live-integration]
    defaults:
      run:
        working-directory: apps/web-console
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web-console/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build + start Next.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          CONTROL_PLANE_BASE_URL: http://localhost:8081
        run: |
          npm run build
          nohup npm start > /tmp/nextjs.log 2>&1 &
          for i in {1..60}; do
            if curl -sf http://localhost:3000 >/dev/null; then echo "Next.js up"; exit 0; fi
            sleep 2
          done
          echo "::error::Next.js did not start"; cat /tmp/nextjs.log; exit 1

      - name: Run Playwright (credentialed suites skip if creds absent)
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          # Leave E2E_* empty until dedicated test users exist in staging Supabase.
          # Spec files call test.skip() when these are unset, so the job stays green.
          E2E_VERIFIED_EMAIL: ${{ secrets.E2E_VERIFIED_EMAIL }}
          E2E_VERIFIED_PASSWORD: ${{ secrets.E2E_VERIFIED_PASSWORD }}
          E2E_UNVERIFIED_EMAIL: ${{ secrets.E2E_UNVERIFIED_EMAIL }}
          E2E_UNVERIFIED_PASSWORD: ${{ secrets.E2E_UNVERIFIED_PASSWORD }}
          E2E_INVITATION_TOKEN: ${{ secrets.E2E_INVITATION_TOKEN }}
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web-console/playwright-report/
          if-no-files-found: ignore
