name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Docker image tags used across live-integration + web-e2e so everyone
  # references the same pre-built image.
  EDGE_IMAGE: hive-edge-api:ci
  CP_IMAGE: hive-control-plane:ci
  WEB_IMAGE: hive-web-console:ci

jobs:
  # ------------------------------------------------------------------
  # Unit-level jobs (run on every PR including forks)
  # ------------------------------------------------------------------

  go-tests:
    name: Go tests (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: edge-api
            path: ./apps/edge-api
          - module: control-plane
            path: ./apps/control-plane
          - module: storage
            path: ./packages/storage
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: |
            apps/edge-api/go.sum
            apps/control-plane/go.sum
            packages/storage/go.sum

      - name: go vet
        working-directory: ${{ matrix.path }}
        run: go vet ./...

      - name: go test
        working-directory: ${{ matrix.path }}
        run: go test -count=1 -short -race -timeout 5m ./...

  web-unit:
    name: Web console (type + unit + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-console
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web-console/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests (vitest)
        run: npm run test:unit

      - name: Build (Next.js)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key

  # ------------------------------------------------------------------
  # Docker build validation — fork PRs only.
  # Same-repo PRs get this implicitly via the live-integration job
  # (which builds + runs the stack against staging), so running both
  # would duplicate work and waste CI minutes.
  # ------------------------------------------------------------------

  docker-build:
    name: Docker build smoke (fork PRs only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build all service images (cached)
        uses: docker/bake-action@v6
        with:
          workdir: .
          files: |
            ./deploy/docker/docker-bake.hcl
          targets: edge-api,control-plane,web-console
          set: |
            *.cache-from=type=gha,scope=docker-build
            *.cache-to=type=gha,scope=docker-build,mode=max

  # ------------------------------------------------------------------
  # Live integration — builds images once with GHA cache, loads them
  # locally, starts stack against staging Supabase, runs all three SDK
  # suites in parallel.
  # Gated on same-repo only so fork PRs never receive secrets.
  # ------------------------------------------------------------------

  live-integration:
    name: Live integration (SDK tests + smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    needs: [go-tests, web-unit]
    # Job-level env: docker compose will interpolate ${VAR} from process env,
    # so we skip the fragile .env heredoc entirely.
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      REDIS_URL: redis://redis:6379/0
      CONTROL_PLANE_PORT: '8081'
      CONTROL_PLANE_BASE_URL: http://localhost:8081
      EDGE_CONTROL_PLANE_BASE_URL: http://control-plane:8081
      LITELLM_MASTER_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      OPENROUTER_DEFAULT_MODEL: ${{ vars.OPENROUTER_DEFAULT_MODEL }}
      OPENROUTER_AUTO_MODEL: ${{ vars.OPENROUTER_AUTO_MODEL }}
      OPENROUTER_FAST_FALLBACK_MODEL: ${{ vars.OPENROUTER_FAST_FALLBACK_MODEL }}
      GROQ_FAST_MODEL: ${{ vars.GROQ_FAST_MODEL }}
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
      S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
      S3_REGION: ${{ secrets.S3_REGION }}
      S3_USE_SSL: 'true'
      S3_BUCKET_FILES: ${{ secrets.S3_BUCKET_FILES }}
      S3_BUCKET_IMAGES: ${{ secrets.S3_BUCKET_IMAGES }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      HIVE_API_KEY: ${{ secrets.HIVE_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Reconstruct SUPABASE_DB_URL
        shell: bash
        env:
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          # Password is stored in its raw decoded form — URL-encode it here so the
          # resulting URL round-trips through pgx/pgconn URL parsing correctly.
          ENC_PW=$(python3 -c 'import os,urllib.parse as u; print(u.quote(os.environ["SUPABASE_DB_PASSWORD"], safe=""))')
          url="postgresql://${SUPABASE_DB_USER}:${ENC_PW}@${SUPABASE_DB_HOST}:${SUPABASE_DB_PORT}/${SUPABASE_DB_NAME}"
          echo "SUPABASE_DB_URL=$url" >> "$GITHUB_ENV"
          echo "reconstructed DB URL (host=${SUPABASE_DB_HOST}, port=${SUPABASE_DB_PORT}, user=${SUPABASE_DB_USER}, db=${SUPABASE_DB_NAME})"

      - name: Pre-verify secrets reached runner env
        shell: bash
        run: |
          set -euo pipefail
          for v in SUPABASE_URL SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY SUPABASE_DB_URL \
                   OPENROUTER_API_KEY HIVE_API_KEY S3_ENDPOINT S3_ACCESS_KEY S3_SECRET_KEY; do
            val="${!v:-}"
            if [ -z "$val" ]; then
              echo "::error::$v is empty in workflow env"
              exit 1
            fi
            echo "  $v: len=${#val}"
          done

      - name: Cache third-party images (redis, litellm)
        id: img-cache
        uses: actions/cache@v4
        with:
          path: /tmp/docker-images
          # Keyed on the pinned tags so tag bumps invalidate the cache.
          key: docker-images-redis-8.4-alpine-litellm-v1.77.7-stable

      - name: Load or pull + save third-party images
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/docker-images
          if [ -f /tmp/docker-images/redis.tar ] && [ -f /tmp/docker-images/litellm.tar ]; then
            echo "loading cached images..."
            docker load -i /tmp/docker-images/redis.tar
            docker load -i /tmp/docker-images/litellm.tar
          else
            echo "cache miss — pulling..."
            docker pull redis:8.4-alpine
            docker pull ghcr.io/berriai/litellm:v1.77.7-stable
            docker save redis:8.4-alpine -o /tmp/docker-images/redis.tar
            docker save ghcr.io/berriai/litellm:v1.77.7-stable -o /tmp/docker-images/litellm.tar
          fi

      - name: Build stack images (buildx + GHA cache)
        uses: docker/bake-action@v6
        with:
          workdir: .
          files: |
            ./deploy/docker/docker-bake.hcl
          targets: edge-api,control-plane,sdk-tests-js,sdk-tests-py,sdk-tests-java
          load: true
          set: |
            *.cache-from=type=gha,scope=stack
            *.cache-to=type=gha,scope=stack,mode=max

      - name: Start core stack (no rebuild — images already loaded)
        working-directory: deploy/docker
        run: |
          docker compose up -d --no-build redis litellm control-plane edge-api

      - name: Wait for services to become healthy
        working-directory: deploy/docker
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 300 ))
          for svc in control-plane edge-api; do
            echo "waiting for $svc..."
            while :; do
              state=$(docker inspect --format '{{.State.Health.Status}}' \
                "$(docker compose ps -q $svc)" 2>/dev/null || echo "starting")
              if [ "$state" = "healthy" ]; then
                echo "$svc: healthy"
                break
              fi
              if [ "$(date +%s)" -gt "$deadline" ]; then
                echo "::error::$svc did not become healthy (last state: $state)"
                docker compose logs --tail=200 $svc
                exit 1
              fi
              sleep 5
            done
          done

      - name: Smoke test — /health + /v1/models
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS http://localhost:8080/health | jq -c
          curl -fsS http://localhost:8081/health | jq -c

          code=$(curl -sS -o /tmp/models.json -w "%{http_code}" \
            http://localhost:8080/v1/models \
            -H "Authorization: Bearer $HIVE_API_KEY")
          echo "GET /v1/models -> HTTP $code"
          if [ "$code" != "200" ]; then
            echo "::error::/v1/models returned $code"
            cat /tmp/models.json
            exit 1
          fi
          jq -r '.data[0:3] | .[] | .id' /tmp/models.json

      - name: Run SDK suites in parallel (JS + Python + Java)
        working-directory: deploy/docker
        shell: bash
        run: |
          # Intentionally no 'set -e' — we need to capture non-zero suite rc
          # rather than have the background subshell die at the failing command.
          set -uo pipefail
          log=/tmp/sdk
          mkdir -p "$log"

          run_suite() {
            local svc=$1
            local rc=0
            docker compose --profile test run --rm --no-deps "$svc" \
              > "$log/$svc.log" 2>&1 || rc=$?
            echo "$rc" > "$log/$svc.rc"
          }

          run_suite sdk-tests-js   &
          run_suite sdk-tests-py   &
          run_suite sdk-tests-java &
          wait

          fail=0
          for svc in sdk-tests-js sdk-tests-py sdk-tests-java; do
            rc=$(cat "$log/$svc.rc" 2>/dev/null || echo 127)
            echo "=============================================="
            echo "== $svc  (exit $rc)"
            echo "=============================================="
            tail -c 30000 "$log/$svc.log" || true
            if [ "$rc" != "0" ]; then fail=1; fi
          done
          exit $fail

      - name: Dump compose logs on failure
        if: failure()
        working-directory: deploy/docker
        run: docker compose logs --no-color --timestamps --tail=500 > /tmp/compose.log || true

      - name: Upload compose logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs
          path: /tmp/compose.log
          if-no-files-found: ignore

      - name: Tear down stack
        if: always()
        working-directory: deploy/docker
        run: docker compose down -v --remove-orphans || true

  # ------------------------------------------------------------------
  # Playwright E2E against the full booted Go stack + Next.js. Runs
  # every spec (unauth, credentialed, openai-sdk) in a single job so
  # `/console/*` server components can reach a real control-plane and
  # the fixture can seed/reset staging Supabase users before each run.
  # ------------------------------------------------------------------

  web-e2e:
    name: Web E2E (full stack)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    # Independently boots its own Go stack + Next.js. Decoupled from
    # `live-integration` so a flaky external provider (e.g. OpenRouter
    # 429 on the SDK suites) no longer blocks the UI test coverage.
    needs: [web-unit, go-tests]
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      REDIS_URL: redis://redis:6379/0
      CONTROL_PLANE_PORT: '8081'
      CONTROL_PLANE_BASE_URL: http://localhost:8081
      EDGE_CONTROL_PLANE_BASE_URL: http://control-plane:8081
      LITELLM_MASTER_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      OPENROUTER_DEFAULT_MODEL: ${{ vars.OPENROUTER_DEFAULT_MODEL }}
      OPENROUTER_AUTO_MODEL: ${{ vars.OPENROUTER_AUTO_MODEL }}
      OPENROUTER_FAST_FALLBACK_MODEL: ${{ vars.OPENROUTER_FAST_FALLBACK_MODEL }}
      GROQ_FAST_MODEL: ${{ vars.GROQ_FAST_MODEL }}
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
      S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
      S3_REGION: ${{ secrets.S3_REGION }}
      S3_USE_SSL: 'true'
      S3_BUCKET_FILES: ${{ secrets.S3_BUCKET_FILES }}
      S3_BUCKET_IMAGES: ${{ secrets.S3_BUCKET_IMAGES }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      HIVE_API_KEY: ${{ secrets.HIVE_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web-console/package-lock.json

      - name: Reconstruct SUPABASE_DB_URL
        shell: bash
        env:
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          ENC_PW=$(python3 -c 'import os,urllib.parse as u; print(u.quote(os.environ["SUPABASE_DB_PASSWORD"], safe=""))')
          url="postgresql://${SUPABASE_DB_USER}:${ENC_PW}@${SUPABASE_DB_HOST}:${SUPABASE_DB_PORT}/${SUPABASE_DB_NAME}"
          echo "SUPABASE_DB_URL=$url" >> "$GITHUB_ENV"

      - name: Cache third-party images (redis, litellm)
        id: img-cache
        uses: actions/cache@v4
        with:
          path: /tmp/docker-images
          key: docker-images-redis-8.4-alpine-litellm-v1.77.7-stable

      - name: Load or pull + save third-party images
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/docker-images
          if [ -f /tmp/docker-images/redis.tar ] && [ -f /tmp/docker-images/litellm.tar ]; then
            docker load -i /tmp/docker-images/redis.tar
            docker load -i /tmp/docker-images/litellm.tar
          else
            docker pull redis:8.4-alpine
            docker pull ghcr.io/berriai/litellm:v1.77.7-stable
            docker save redis:8.4-alpine -o /tmp/docker-images/redis.tar
            docker save ghcr.io/berriai/litellm:v1.77.7-stable -o /tmp/docker-images/litellm.tar
          fi

      - name: Build stack images (reuse GHA cache from live-integration)
        uses: docker/bake-action@v6
        with:
          workdir: .
          files: |
            ./deploy/docker/docker-bake.hcl
          targets: edge-api,control-plane
          load: true
          set: |
            *.cache-from=type=gha,scope=stack
            *.cache-to=type=gha,scope=stack,mode=max

      - name: Start core stack (no rebuild — images already loaded)
        working-directory: deploy/docker
        run: |
          docker compose up -d --no-build redis litellm control-plane edge-api

      - name: Wait for services to become healthy
        working-directory: deploy/docker
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 300 ))
          for svc in control-plane edge-api; do
            while :; do
              state=$(docker inspect --format '{{.State.Health.Status}}' \
                "$(docker compose ps -q $svc)" 2>/dev/null || echo "starting")
              if [ "$state" = "healthy" ]; then
                echo "$svc: healthy"
                break
              fi
              if [ "$(date +%s)" -gt "$deadline" ]; then
                echo "::error::$svc did not become healthy (last state: $state)"
                docker compose logs --tail=200 $svc
                exit 1
              fi
              sleep 5
            done
          done

      - name: Install web-console deps
        working-directory: apps/web-console
        run: npm ci

      - name: Read Playwright version
        id: pw
        working-directory: apps/web-console
        run: |
          v=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: apps/web-console
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit path)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: apps/web-console
        run: npx playwright install-deps chromium

      - name: Build + start Next.js (points at booted control-plane)
        working-directory: apps/web-console
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          CONTROL_PLANE_BASE_URL: http://localhost:8081
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          npm run build
          nohup npm start > /tmp/nextjs.log 2>&1 &
          for i in {1..60}; do
            if (echo > /dev/tcp/127.0.0.1/3000) 2>/dev/null; then echo "Next.js up"; exit 0; fi
            sleep 2
          done
          echo "::error::Next.js did not start"; cat /tmp/nextjs.log; exit 1

      - name: Run full Playwright suite (unauth + credentialed + openai-sdk)
        working-directory: apps/web-console
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          EDGE_BASE_URL: http://localhost:8080/v1
          # Fixture (tests/e2e/support/e2e-auth-fixtures.mjs) seeds + resets
          # CI test users in staging Supabase before each spec via admin API.
          # E2E_* env vars are optional — if unset, the fixture falls back to
          # defaults baked into e2e-auth-defaults.json.
          E2E_VERIFIED_EMAIL: ${{ secrets.E2E_VERIFIED_EMAIL }}
          E2E_VERIFIED_PASSWORD: ${{ secrets.E2E_VERIFIED_PASSWORD }}
          E2E_UNVERIFIED_EMAIL: ${{ secrets.E2E_UNVERIFIED_EMAIL }}
          E2E_UNVERIFIED_PASSWORD: ${{ secrets.E2E_UNVERIFIED_PASSWORD }}
          E2E_INVITATION_TOKEN: ${{ secrets.E2E_INVITATION_TOKEN }}
        run: npx playwright test

      - name: Dump compose logs on failure
        if: failure()
        working-directory: deploy/docker
        run: docker compose logs --no-color --timestamps --tail=500 > /tmp/compose-web-e2e-api.log || true

      - name: Upload compose logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs-web-e2e-api
          path: /tmp/compose-web-e2e-api.log
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-api
          path: apps/web-console/playwright-report/
          if-no-files-found: ignore

      - name: Tear down stack
        if: always()
        working-directory: deploy/docker
        run: docker compose down -v --remove-orphans || true
