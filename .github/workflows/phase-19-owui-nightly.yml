name: phase-19-owui-nightly

on:
  schedule:
    - cron: '0 6 * * *'
  pull_request:
    types: [labeled]
  workflow_dispatch:

concurrency:
  group: phase-19-owui-${{ github.ref }}
  cancel-in-progress: true

jobs:
  owui-e2e:
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-owui-e2e')) }}
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      OWUI_URL: http://localhost:3003
      OWUI_E2E_EMAIL: ${{ secrets.OWUI_E2E_EMAIL }}
      OWUI_E2E_PASSWORD: ${{ secrets.OWUI_E2E_PASSWORD }}
      OWUI_E2E_MAX_USD_PER_RUN: '1'
      OWUI_E2E_MODE: 'true'
      LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Reconstruct SUPABASE_DB_URL
        # HIVE_TEST_DB_URL secret does not exist (phantom -- 2026-07-04 run
        # 28643196239 failed on it). Reconstruct from the same DB part
        # secrets ci.yml already uses successfully (see ci.yml
        # "Reconstruct SUPABASE_DB_URL" step).
        shell: bash
        env:
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          for v in SUPABASE_DB_HOST SUPABASE_DB_PORT SUPABASE_DB_USER SUPABASE_DB_NAME SUPABASE_DB_PASSWORD; do
            val="${!v:-}"
            if [ -z "$val" ]; then
              echo "::error::$v is empty; cannot reconstruct SUPABASE_DB_URL"
              exit 1
            fi
          done
          # Password is stored in its raw decoded form — URL-encode it here so the
          # resulting URL round-trips through pgx/pgconn URL parsing correctly.
          ENC_PW=$(python3 -c 'import os,urllib.parse as u; print(u.quote(os.environ["SUPABASE_DB_PASSWORD"], safe=""))')
          url="postgresql://${SUPABASE_DB_USER}:${ENC_PW}@${SUPABASE_DB_HOST}:${SUPABASE_DB_PORT}/${SUPABASE_DB_NAME}"
          echo "SUPABASE_DB_URL=$url" >> "$GITHUB_ENV"
          echo "reconstructed DB URL (host=${SUPABASE_DB_HOST}, port=${SUPABASE_DB_PORT}, user=${SUPABASE_DB_USER}, db=${SUPABASE_DB_NAME})"
      - name: Materialize .env.ci
        # local/test profiles boot control-plane + edge-api + open-webui +
        # web-console, all of which fail fast without real Supabase/S3/LLM
        # provider credentials (see CLAUDE.md fail-fast rule). Mirrors the
        # secret set already proven working in ci.yml's live-integration job.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_BUCKET_FILES: ${{ secrets.S3_BUCKET_FILES }}
          S3_BUCKET_IMAGES: ${{ secrets.S3_BUCKET_IMAGES }}
          LITELLM_MASTER_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          for v in SUPABASE_URL SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY SUPABASE_DB_URL \
                   S3_ENDPOINT S3_ACCESS_KEY S3_SECRET_KEY S3_REGION \
                   OPENROUTER_API_KEY GROQ_API_KEY; do
            val="${!v:-}"
            if [ -z "$val" ]; then
              echo "::error::$v is empty; cannot materialize .env.ci"
              exit 1
            fi
          done
          cat > .env.ci <<EOF
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
          SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
          SUPABASE_DB_URL=${SUPABASE_DB_URL}
          REDIS_URL=redis://redis:6379/0
          S3_ENDPOINT=${S3_ENDPOINT}
          S3_ACCESS_KEY=${S3_ACCESS_KEY}
          S3_SECRET_KEY=${S3_SECRET_KEY}
          S3_REGION=${S3_REGION}
          S3_BUCKET_FILES=${S3_BUCKET_FILES:-hive-files}
          S3_BUCKET_IMAGES=${S3_BUCKET_IMAGES:-hive-images}
          LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-litellm-dev-key}
          OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
          GROQ_API_KEY=${GROQ_API_KEY}
          NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-$SUPABASE_URL}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-$SUPABASE_ANON_KEY}
          OWUI_SHIM_KEY=$(openssl rand -base64 32)
          EOF
          chmod 600 .env.ci
      - name: Boot stack with test-owui + observability-langfuse profiles
        run: |
          cd deploy/docker
          docker compose --env-file ../../.env.ci \
            --profile local --profile test --profile test-owui --profile observability-langfuse \
            up -d --build
          healthy=0
          for i in $(seq 1 60); do
            if curl -fsSL http://localhost:3003/health; then
              healthy=1
              break
            fi
            sleep 2
          done
          if [ "$healthy" -ne 1 ]; then
            echo "OWUI failed to become healthy within 120s"
            docker compose ps
            exit 1
          fi
      - name: Run OWUI Playwright suite
        run: |
          if [ -z "${OWUI_E2E_EMAIL:-}" ] || [ -z "${OWUI_E2E_PASSWORD:-}" ]; then
            echo "::warning::OWUI e2e skipped, OWUI_E2E_EMAIL/OWUI_E2E_PASSWORD secrets not provisioned"
          fi
          npm i -g pnpm@9
          cd apps/web-console
          pnpm install
          # See phase-19.yml for the rationale on the runtime-only pg dep.
          pnpm add --save-dev --ignore-workspace pg
          pnpm exec playwright install --with-deps chromium
          pnpm e2e:owui
          pnpm e2e:owui:perf
      - name: SOC2 coverage report
        if: always()
        run: |
          npm i --no-save yaml pg
          node tools/soc2-coverage-report.mjs || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owui-playwright-report
          path: apps/web-console/playwright-report-owui
      - name: Slack on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -fsSL -X POST -H 'Content-Type: application/json' \
            -d '{"text":"phase-19-owui-nightly red — see GHA run"}' \
            "$SLACK_WEBHOOK_URL"
