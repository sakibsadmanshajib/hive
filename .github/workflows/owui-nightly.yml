name: OWUI nightly e2e

on:
  schedule:
    - cron: '0 6 * * *'
  pull_request:
    types: [labeled]
  workflow_dispatch:

concurrency:
  group: owui-nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  owui-e2e:
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-owui-e2e')) }}
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      OWUI_URL: http://localhost:3003
      OWUI_E2E_MAX_USD_PER_RUN: '1'
      OWUI_E2E_MODE: 'true'
      LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Reconstruct SUPABASE_DB_URL
        # HIVE_TEST_DB_URL secret does not exist (phantom -- 2026-07-04 run
        # 28643196239 failed on it). Reconstruct from the same DB part
        # secrets ci.yml already uses successfully (see ci.yml
        # "Reconstruct SUPABASE_DB_URL" step).
        shell: bash
        env:
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          for v in SUPABASE_DB_HOST SUPABASE_DB_PORT SUPABASE_DB_USER SUPABASE_DB_NAME SUPABASE_DB_PASSWORD; do
            val="${!v:-}"
            if [ -z "$val" ]; then
              echo "::error::$v is empty; cannot reconstruct SUPABASE_DB_URL"
              exit 1
            fi
          done
          # Password is stored in its raw decoded form — URL-encode it here so the
          # resulting URL round-trips through pgx/pgconn URL parsing correctly.
          ENC_PW=$(python3 -c 'import os,urllib.parse as u; print(u.quote(os.environ["SUPABASE_DB_PASSWORD"], safe=""))')
          url="postgresql://${SUPABASE_DB_USER}:${ENC_PW}@${SUPABASE_DB_HOST}:${SUPABASE_DB_PORT}/${SUPABASE_DB_NAME}"
          echo "SUPABASE_DB_URL=$url" >> "$GITHUB_ENV"
          echo "reconstructed DB URL (host=${SUPABASE_DB_HOST}, port=${SUPABASE_DB_PORT}, user=${SUPABASE_DB_USER}, db=${SUPABASE_DB_NAME})"
      - name: Seed OWUI e2e test user
        # Self-provisions the owui-e2e tenant, GoTrue user, membership, and a
        # real "hk_" Hive API key used as OWUI_SHIM_KEY (idempotent, password
        # and key rotated every run). Runs BEFORE "Materialize .env.ci" now
        # (moved from after it) because that step consumes the minted
        # OWUI_SHIM_KEY. Removes the need for hand-managed OWUI_E2E_EMAIL /
        # OWUI_E2E_PASSWORD repo secrets.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          out=$(python3 scripts/seed-owui-e2e-user.py)
          email=$(printf '%s\n' "$out" | grep '^EMAIL=' | cut -d= -f2-)
          password=$(printf '%s\n' "$out" | grep '^PASSWORD=' | cut -d= -f2-)
          shim_key=$(printf '%s\n' "$out" | grep '^SHIM_KEY=' | cut -d= -f2-)
          if [ -z "$email" ] || [ -z "$password" ] || [ -z "$shim_key" ]; then
            echo "::error::seed-owui-e2e-user.py did not print EMAIL/PASSWORD/SHIM_KEY"
            exit 1
          fi
          echo "::add-mask::$password"
          echo "::add-mask::$shim_key"
          echo "OWUI_E2E_EMAIL=$email" >> "$GITHUB_ENV"
          echo "OWUI_E2E_PASSWORD=$password" >> "$GITHUB_ENV"
          echo "OWUI_SHIM_KEY=$shim_key" >> "$GITHUB_ENV"
      - name: Materialize .env.ci
        # local/test profiles boot control-plane + edge-api + open-webui +
        # web-console, all of which fail fast without real Supabase/S3/LLM
        # provider credentials (see CLAUDE.md fail-fast rule). Mirrors the
        # secret set already proven working in ci.yml's live-integration job.
        #
        # The model literals below (OPENROUTER_DEFAULT_MODEL, etc.) are model
        # slugs, not secrets, and are hardcoded intentionally: without them
        # LiteLLM boots with an empty model_list ("LLM Provider NOT provided.
        # You passed model=") and OWUI's /api/models returns zero models, so
        # no chat request can be sent (run 28684729556). Values mirror the
        # free/cheap-tier defaults in .env.example and deploy/litellm/config.yaml.
        #
        # SUPABASE_JWT_ISSUER/AUDIENCE/JWKS_URL were previously omitted here,
        # which silently disabled edge-api's whole phase-19 JWT + OWUI-unwrap
        # wiring ("WARNING: phase-19 JWT auth wiring skipped", run
        # 28685935882) -- every /v1/* call fell back to the raw API-key path
        # instead of per-user JWT auth. Derived from SUPABASE_URL per the
        # documented convention in .env.example; no new secret needed.
        # OWUI_SHIM_KEY now comes from the "Seed OWUI e2e test user" step
        # (a real hk_ Hive API key) instead of a random, unregistered value --
        # see that step and scripts/seed-owui-e2e-user.py for why a random
        # shim value can never authenticate OWUI's bodyless GET /v1/models
        # connection probe.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_BUCKET_FILES: ${{ secrets.S3_BUCKET_FILES }}
          S3_BUCKET_IMAGES: ${{ secrets.S3_BUCKET_IMAGES }}
          LITELLM_MASTER_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_OAUTH_CLIENT_ID: ${{ secrets.SUPABASE_OAUTH_CLIENT_ID }}
          SUPABASE_OAUTH_CLIENT_SECRET: ${{ secrets.SUPABASE_OAUTH_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          for v in SUPABASE_URL SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY SUPABASE_DB_URL \
                   S3_ENDPOINT S3_ACCESS_KEY S3_SECRET_KEY S3_REGION \
                   OPENROUTER_API_KEY GROQ_API_KEY OWUI_SHIM_KEY; do
            val="${!v:-}"
            if [ -z "$val" ]; then
              echo "::error::$v is empty; cannot materialize .env.ci"
              exit 1
            fi
          done
          cat > .env.ci <<EOF
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
          SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
          SUPABASE_DB_URL=${SUPABASE_DB_URL}
          SUPABASE_JWT_ISSUER=${SUPABASE_URL}/auth/v1
          SUPABASE_JWT_AUDIENCE=authenticated
          SUPABASE_JWKS_URL=${SUPABASE_URL}/auth/v1/.well-known/jwks.json
          REDIS_URL=redis://redis:6379/0
          S3_ENDPOINT=${S3_ENDPOINT}
          S3_ACCESS_KEY=${S3_ACCESS_KEY}
          S3_SECRET_KEY=${S3_SECRET_KEY}
          S3_REGION=${S3_REGION}
          S3_BUCKET_FILES=${S3_BUCKET_FILES:-hive-files}
          S3_BUCKET_IMAGES=${S3_BUCKET_IMAGES:-hive-images}
          LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-litellm-dev-key}
          OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
          GROQ_API_KEY=${GROQ_API_KEY}
          OPENROUTER_DEFAULT_MODEL=openrouter/free
          OPENROUTER_AUTO_MODEL=openrouter/free
          OPENROUTER_EMBEDDING_MODEL=openrouter/nvidia/llama-nemotron-embed-vl-1b-v2:free
          OPENROUTER_EMBEDDING_FALLBACK_MODEL=openrouter/qwen/qwen3-embedding-8b
          GROQ_FAST_MODEL=groq/openai/gpt-oss-20b
          GROQ_REASONING_MODEL=groq/openai/gpt-oss-120b
          NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-$SUPABASE_URL}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-$SUPABASE_ANON_KEY}
          SUPABASE_OAUTH_CLIENT_ID=${SUPABASE_OAUTH_CLIENT_ID:-}
          SUPABASE_OAUTH_CLIENT_SECRET=${SUPABASE_OAUTH_CLIENT_SECRET:-}
          OWUI_SHIM_KEY=${OWUI_SHIM_KEY}
          EOF
          chmod 600 .env.ci
      - name: Boot stack with test-owui + observability-langfuse profiles
        run: |
          cd deploy/docker
          docker compose --env-file ../../.env.ci \
            --profile local --profile test --profile test-owui --profile observability-langfuse \
            up -d --build
          healthy=0
          for i in $(seq 1 60); do
            if curl -fsSL http://localhost:3003/health; then
              healthy=1
              break
            fi
            sleep 2
          done
          if [ "$healthy" -ne 1 ]; then
            echo "OWUI failed to become healthy within 120s"
            docker compose ps
            exit 1
          fi
      - name: Diagnose model catalog layers
        # Non-fatal (set +e / || true throughout): attributes an empty OWUI
        # model list to one of three layers in a single glance --
        # 1) LiteLLM has no model_list (env/config problem upstream of Hive)
        # 2) edge-api /v1/models rejects the OWUI shim credential (auth problem)
        # 3) both return models but OWUI still shows none (OWUI-side problem)
        # Prints only counts/status codes, never secrets or response bodies.
        env:
          LITELLM_MASTER_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
        run: |
          set +e
          litellm_status=$(curl -s -o /tmp/litellm-models.json -w '%{http_code}' \
            -H "Authorization: Bearer ${LITELLM_MASTER_KEY:-litellm-dev-key}" \
            http://localhost:4000/v1/models)
          litellm_count=$(jq -r 'if (.data | type) == "array" then (.data | length) else "parse-error" end' /tmp/litellm-models.json 2>/dev/null)
          edge_status=$(curl -s -o /tmp/edge-models.json -w '%{http_code}' \
            -H "Authorization: Bearer ${OWUI_SHIM_KEY}" \
            http://localhost:8080/v1/models)
          edge_count=$(jq -r 'if (.data | type) == "array" then (.data | length) else "parse-error" end' /tmp/edge-models.json 2>/dev/null)
          echo "layer 1 (litellm /v1/models):  status=${litellm_status} count=${litellm_count:-parse-error}"
          echo "layer 2 (edge-api /v1/models): status=${edge_status} count=${edge_count:-parse-error}"
          exit 0
      - name: Probe Supabase token endpoint from OWUI container
        # Diagnostic only, non-fatal (|| true). Leading hypothesis for the
        # run 28676421973 callback hang: runner egress stall (IPv6/DNS
        # connect) reaching Supabase from inside the container -- local
        # repro with the identical image and endpoints completes in under
        # 3s (~1.3s per call). Credentials are read from env and never
        # printed; only status code and elapsed time are logged.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_OAUTH_CLIENT_ID: ${{ secrets.SUPABASE_OAUTH_CLIENT_ID }}
          SUPABASE_OAUTH_CLIENT_SECRET: ${{ secrets.SUPABASE_OAUTH_CLIENT_SECRET }}
        run: |
          cd deploy/docker
          docker compose --env-file ../../.env.ci exec -T \
            -e SUPABASE_URL -e SUPABASE_OAUTH_CLIENT_ID -e SUPABASE_OAUTH_CLIENT_SECRET \
            open-webui python3 -c "
          import os, time, httpx
          t = time.time()
          r = httpx.post(
              os.environ['SUPABASE_URL'] + '/auth/v1/oauth/token',
              data={
                  'grant_type': 'authorization_code',
                  'code': 'bogus',
                  'redirect_uri': 'http://localhost:3003/oauth/oidc/callback',
                  'code_verifier': 'bogus',
              },
              auth=(os.environ['SUPABASE_OAUTH_CLIENT_ID'], os.environ['SUPABASE_OAUTH_CLIENT_SECRET']),
              timeout=20,
          )
          print('token-endpoint', r.status_code, round(time.time() - t, 2), 's')
          " || true
      - name: Run OWUI Playwright suite
        # OWUI_E2E_EMAIL/PASSWORD are always provisioned by the "Seed OWUI
        # e2e test user" step above (schedule, workflow_dispatch, and
        # labeled pull_request runs all reach this step). SUPABASE_OAUTH_
        # CLIENT_ID/SECRET are a separate, ops-provisioned pair (Supabase
        # OAuth App registration) that do not exist yet -- owui.setup.ts and
        # playwright.owui.config.ts's hasCreds gate both skip cleanly on
        # their absence (mirrors #266's OWUI_E2E_* skip mechanism), so this
        # step still exits 0 until they're provisioned.
        env:
          SUPABASE_OAUTH_CLIENT_ID: ${{ secrets.SUPABASE_OAUTH_CLIENT_ID }}
          SUPABASE_OAUTH_CLIENT_SECRET: ${{ secrets.SUPABASE_OAUTH_CLIENT_SECRET }}
          # CI runs against free-tier OpenRouter/Groq routes, where
          # first-token latency is dominated by provider-side queueing, not
          # our stack. performance/ttfb.spec.ts's strict 8s default (meant
          # for a warm, dedicated model) is meaningless here; give it real
          # headroom so the run stays green while still logging the actual
          # number (run 28695213565).
          OWUI_TTFB_BUDGET_MS: '30000'
        run: |
          if [ -z "${SUPABASE_OAUTH_CLIENT_ID:-}" ] || [ -z "${SUPABASE_OAUTH_CLIENT_SECRET:-}" ]; then
            echo "::warning::OWUI OAuth e2e skipped, SUPABASE_OAUTH_CLIENT_ID/SUPABASE_OAUTH_CLIENT_SECRET secrets not provisioned"
          fi
          npm i -g pnpm@9
          cd apps/web-console
          pnpm install
          # See phase-19.yml for the rationale on the runtime-only pg dep.
          pnpm add --save-dev --ignore-workspace pg
          pnpm exec playwright install --with-deps chromium
          pnpm e2e:owui
          pnpm e2e:owui:perf
      - name: Dump container logs on failure
        # The OWUI OAuth callback can hang with no visible error on the
        # Playwright side (e.g. run 28676421973's 30s hang after the token
        # exchange). The Playwright report has no insight into what the
        # backend containers were doing, so pull their logs directly.
        if: failure()
        run: |
          cd deploy/docker
          # #269: a full owui project run generates enough per-request HTTP
          # access-log noise (open-webui) to push earlier diagnostic lines
          # (e.g. the hive_jwt_forward JWT-claims probe) out of a 300-line
          # tail before this step runs (run 28688900087). 2000 covers a full
          # 6-spec run with room to spare.
          docker compose --env-file ../../.env.ci logs --no-color --tail 2000 \
            open-webui litellm edge-api control-plane > $GITHUB_WORKSPACE/compose-logs.txt 2>&1 || true
      - name: SOC2 coverage report
        if: always()
        run: |
          npm i --no-save yaml pg
          node tools/soc2-coverage-report.mjs || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owui-playwright-report
          path: apps/web-console/playwright-report-owui
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: owui-compose-logs
          path: compose-logs.txt
      - name: Slack on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -fsSL -X POST -H 'Content-Type: application/json' \
            -d '{"text":"OWUI nightly e2e red, see GHA run"}' \
            "$SLACK_WEBHOOK_URL"
