services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env.example
    environment:
      POSTGRES_URL: postgres://postgres:postgres@host.docker.internal:54322/postgres
      REDIS_URL: redis://redis:6379
      PORT: 8080
      ADMIN_STATUS_TOKEN: ${ADMIN_STATUS_TOKEN:-}
      ALLOW_DEMO_PAYMENT_CONFIRM: ${ALLOW_DEMO_PAYMENT_CONFIRM:-true}
      ALLOW_DEV_API_KEY_PREFIX: ${ALLOW_DEV_API_KEY_PREFIX:-false}
      PROVIDER_TIMEOUT_MS: ${PROVIDER_TIMEOUT_MS:-4000}
      PROVIDER_MAX_RETRIES: ${PROVIDER_MAX_RETRIES:-1}
      WEB_INTERNAL_GUEST_TOKEN: ${WEB_INTERNAL_GUEST_TOKEN:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      OLLAMA_FREE_MODEL: ${OLLAMA_FREE_MODEL:-}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-}
      OLLAMA_MAX_RETRIES: ${OLLAMA_MAX_RETRIES:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-}
      OPENROUTER_FREE_MODEL: ${OPENROUTER_FREE_MODEL:-}
      OPENROUTER_TIMEOUT_MS: ${OPENROUTER_TIMEOUT_MS:-}
      OPENROUTER_MAX_RETRIES: ${OPENROUTER_MAX_RETRIES:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
      GROQ_FREE_MODEL: ${GROQ_FREE_MODEL:-}
      GROQ_TIMEOUT_MS: ${GROQ_TIMEOUT_MS:-}
      GROQ_MAX_RETRIES: ${GROQ_MAX_RETRIES:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL:-gpt-image-1}
      OPENAI_FREE_MODEL: ${OPENAI_FREE_MODEL:-}
      OPENAI_TIMEOUT_MS: ${OPENAI_TIMEOUT_MS:-}
      OPENAI_MAX_RETRIES: ${OPENAI_MAX_RETRIES:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3-flash-preview}
      GEMINI_FREE_MODEL: ${GEMINI_FREE_MODEL:-}
      GEMINI_TIMEOUT_MS: ${GEMINI_TIMEOUT_MS:-}
      GEMINI_MAX_RETRIES: ${GEMINI_MAX_RETRIES:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com/v1}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      ANTHROPIC_FREE_MODEL: ${ANTHROPIC_FREE_MODEL:-}
      ANTHROPIC_TIMEOUT_MS: ${ANTHROPIC_TIMEOUT_MS:-}
      ANTHROPIC_MAX_RETRIES: ${ANTHROPIC_MAX_RETRIES:-}
      LANGFUSE_ENABLED: ${LANGFUSE_ENABLED:-true}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-http://langfuse:3000}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-123}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-123}
      SUPABASE_URL: http://host.docker.internal:54321
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-dev-service-role}
      SUPABASE_AUTH_ENABLED: ${SUPABASE_AUTH_ENABLED:-true}
      SUPABASE_USER_REPO_ENABLED: ${SUPABASE_USER_REPO_ENABLED:-true}
      SUPABASE_API_KEYS_ENABLED: ${SUPABASE_API_KEYS_ENABLED:-true}
      SUPABASE_BILLING_STORE_ENABLED: ${SUPABASE_BILLING_STORE_ENABLED:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
      - ollama
      - langfuse
    ports:
      - "8080:8080"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:8080}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://127.0.0.1:54321}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-test-supabase-anon-key}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:8080}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://127.0.0.1:54321}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-test-supabase-anon-key}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://api:8080}
      WEB_INTERNAL_GUEST_TOKEN: ${WEB_INTERNAL_GUEST_TOKEN:-}
    depends_on:
      - api
    ports:
      - "3000:3000"

  langfuse:
    image: langfuse/langfuse:2
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3030:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=my_super_secret_langfuse_key
      - SALT=my_super_secret_salt
      - NEXTAUTH_URL=http://localhost:3030
      - TELEMETRY_ENABLED=false
      - LANGFUSE_INIT_ORG_ID=org_123
      - LANGFUSE_INIT_ORG_NAME=Hive
      - LANGFUSE_INIT_PROJECT_ID=prj_123
      - LANGFUSE_INIT_PROJECT_NAME=HiveAPI
      - LANGFUSE_INIT_PROJECT_PUBLIC_KEY=pk-lf-123
      - LANGFUSE_INIT_PROJECT_SECRET_KEY=sk-lf-123
      - LANGFUSE_INIT_USER_EMAIL=admin@hive.local
      - LANGFUSE_INIT_USER_PASSWORD=admin123

  langfuse-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    ports:
      - "5434:5432"
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 2s
      timeout: 2s
      retries: 5

volumes:
  ollama_data:
  langfuse_db_data:
