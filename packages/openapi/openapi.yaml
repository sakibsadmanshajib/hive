openapi: 3.1.0
info:
  title: BD AI Gateway API (TypeScript Scaffold)
  version: 0.2.0
  description: Fastify + Next.js MVP scaffold preserving Python implementation.
servers:
  - url: http://127.0.0.1:8080
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: API is healthy
  /v1/models:
    get:
      summary: List available models
      responses:
        "200":
          description: OpenAI-style model list
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    example: list
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Model"
  /v1/chat/completions:
    post:
      summary: OpenAI-compatible chat completion
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                model:
                  type: string
                  default: auto
                messages:
                  type: array
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                      content:
                        type: string
      responses:
        "200":
          description: Chat completion response
        "401":
          description: Missing API key
        "402":
          description: Insufficient credits
  /v1/responses:
    post:
      summary: OpenAI-compatible responses endpoint
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                input:
                  type: string
      responses:
        "200":
          description: Response payload
        "401":
          description: Missing API key
        "402":
          description: Insufficient credits
  /v1/images/generations:
    post:
      summary: OpenAI-compatible image generation endpoint
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImageGenerationRequest"
      responses:
        "200":
          description: Generated image metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageGenerationResponse"
        "401":
          description: Missing or invalid credentials
        "402":
          description: Insufficient credits
        "502":
          description: Provider unavailable
  /v1/credits/balance:
    get:
      summary: Get user credit balance
      parameters:
        - in: header
          name: x-api-key
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Credit balance
        "401":
          description: Missing API key
  /v1/usage:
    get:
      summary: List usage events for key owner
      parameters:
        - in: header
          name: x-api-key
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Usage list
        "401":
          description: Missing API key
  /v1/users/me:
    get:
      summary: Get authenticated user developer snapshot
      parameters:
        - in: header
          name: authorization
          required: true
          schema:
            type: string
            example: Bearer <supabase-access-token>
      responses:
        "200":
          description: User snapshot including credits and API key metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/UserProfile"
                  credits:
                    $ref: "#/components/schemas/CreditBalance"
                  api_keys:
                    type: array
                    items:
                      $ref: "#/components/schemas/ManagedApiKey"
                  api_key_events:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApiKeyEvent"
        "401":
          description: Missing or invalid session token
        "403":
          description: Forbidden
  /v1/users/api-keys:
    get:
      summary: List authenticated user API keys and lifecycle events
      parameters:
        - in: header
          name: authorization
          required: true
          schema:
            type: string
            example: Bearer <supabase-access-token>
      responses:
        "200":
          description: Managed API keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ManagedApiKey"
                  events:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApiKeyEvent"
        "401":
          description: Missing or invalid session token
        "403":
          description: Forbidden
    post:
      summary: Create a managed API key for the authenticated user
      parameters:
        - in: header
          name: authorization
          required: true
          schema:
            type: string
            example: Bearer <supabase-access-token>
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nickname, scopes]
              properties:
                nickname:
                  type: string
                scopes:
                  type: array
                  items:
                    type: string
                    enum: [chat, image, usage, billing]
                expiresAt:
                  type: string
                  format: date-time
      responses:
        "201":
          description: Raw key returned once with persisted metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:
                    type: string
                  nickname:
                    type: string
                  scopes:
                    type: array
                    items:
                      type: string
                  expiresAt:
                    type: string
                    format: date-time
        "400":
          description: Invalid create request
        "401":
          description: Missing or invalid session token
        "403":
          description: Forbidden
  /v1/users/api-keys/{id}/revoke:
    post:
      summary: Revoke a managed API key by stable id
      parameters:
        - in: header
          name: authorization
          required: true
          schema:
            type: string
            example: Bearer <supabase-access-token>
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Key revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  revoked:
                    type: boolean
                  id:
                    type: string
        "401":
          description: Missing or invalid session token
        "403":
          description: Forbidden
        "404":
          description: API key not found
  /v1/payments/intents:
    post:
      summary: Create top-up payment intent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: string
                bdt_amount:
                  type: number
                provider:
                  type: string
                  enum: [bkash, sslcommerz]
      responses:
        "201":
          description: Payment intent created
  /v1/payments/webhook:
    post:
      summary: Handle verified payment callback
      parameters:
        - in: header
          name: x-bkash-signature
          required: false
          schema:
            type: string
        - in: header
          name: x-bkash-timestamp
          required: false
          schema:
            type: string
        - in: header
          name: x-sslcommerz-signature
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  type: string
                  enum: [bkash, sslcommerz]
                intent_id:
                  type: string
                provider_txn_id:
                  type: string
                verified:
                  type: boolean
      responses:
        "200":
          description: Webhook accepted
        "401":
          description: Invalid signature
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key or session token
    apiKeyHeader:
      type: apiKey
      in: header
      name: x-api-key
  schemas:
    Model:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          example: model
    UserProfile:
      type: object
      properties:
        user_id:
          type: string
        email:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time
    CreditBalance:
      type: object
      properties:
        userId:
          type: string
        availableCredits:
          type: number
        purchasedCredits:
          type: number
        promoCredits:
          type: number
    ManagedApiKey:
      type: object
      properties:
        id:
          type: string
          description: Stable UUID used for backend management operations such as revocation.
        key_id:
          type: string
          description: Visible key prefix returned for display and identification in the developer UI.
        nickname:
          type: string
        status:
          type: string
          enum: [active, revoked, expired]
        revoked:
          type: boolean
        scopes:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        revokedAt:
          type: string
          format: date-time
    ApiKeyEvent:
      type: object
      properties:
        id:
          type: string
        apiKeyId:
          type: string
        userId:
          type: string
        eventType:
          type: string
          enum: [created, revoked, expired_observed]
        eventAt:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
    ImageGenerationRequest:
      type: object
      required: [prompt]
      properties:
        model:
          type: string
          default: image-basic
        prompt:
          type: string
        n:
          type: integer
          minimum: 1
          default: 1
        size:
          type: string
          examples: ["1024x1024"]
        response_format:
          type: string
          enum: [url, b64_json]
          default: url
        user:
          type: string
    ImageGenerationResponse:
      type: object
      required: [created, data]
      properties:
        created:
          type: integer
        data:
          type: array
          items:
            type: object
            oneOf:
              - required: [url]
              - required: [b64_json]
            properties:
              url:
                type: string
              b64_json:
                type: string
