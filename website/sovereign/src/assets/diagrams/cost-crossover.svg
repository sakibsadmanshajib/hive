<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="cc-title cc-desc" fill="none" class="diagram diagram--crossover">
  <title id="cc-title">Cumulative cost over time: metered cloud versus owned hardware</title>
  <desc id="cc-desc">A conceptual line chart with no numbers. The horizontal axis is time and usage; the vertical axis is cumulative cost. Metered cloud rises as a steady steep line that never stops climbing. Owned or colocated hardware starts with an upfront step then stays nearly flat. The two lines cross at a marked breakeven point, after which owned costs less.</desc>

  <!--
    Conceptual cost-crossover. STATIC companion to the real Recharts TCO island
    on /pricing; this one carries NO numbers and states the shape of the
    argument anywhere on the site without the JS island.

    Colour rule (cost chart, not risk): owned series = forest accent, cloud /
    competitor series = GREY, never red. Red is not used in this file.
    Recommended host CSS:
      .diagram { color: #0d1117; }
      .diagram .d-faint   { stroke: #e4e2dc; }   gridlines, very low contrast
      .diagram .d-axis    { stroke: #d4d1c9; }
      .diagram .d-muted   { fill: #6b7585; }
      .diagram .d-grey    { stroke: #6b7585; }    metered cloud
      .diagram .d-accent  { stroke: #0d3b2e; fill: #0d3b2e; }  owned
      .diagram text       { font-family: 'Inter', system-ui, sans-serif; }
      .diagram .d-num     { font-family: 'Geist Mono', monospace; }

    Plot area: x 80..680, y 60..340. Origin at (80,340).

    Crossover geometry (verified): cloud line (80,340)->(680,96) has equation
    y = 340 - (244/600)(x-80); owned flat leg (150,222)->(680,196) has equation
    y = 222 - (26/530)(x-150). Setting equal gives x = 400.4, y = 209.7, so the
    marker at (400,210) sits on the true intersection of the two lines.
  -->

  <!-- faint horizontal gridlines (no values) -->
  <g class="d-faint" stroke="#e4e2dc" stroke-width="1">
    <line x1="80" y1="120" x2="680" y2="120" />
    <line x1="80" y1="190" x2="680" y2="190" />
    <line x1="80" y1="260" x2="680" y2="260" />
  </g>

  <!-- axes -->
  <g class="d-axis" stroke="#d4d1c9" stroke-width="1.5">
    <line x1="80" y1="60" x2="80" y2="340" />
    <line x1="80" y1="340" x2="680" y2="340" />
  </g>
  <text x="80" y="372" font-size="13" fill="#6b7585" class="d-muted">Time and usage</text>
  <text x="680" y="372" text-anchor="end" font-size="13" fill="#6b7585" class="d-muted" font-style="italic">the meter never stops</text>
  <g transform="translate(38 200) rotate(-90 0 0)">
    <text x="0" y="0" text-anchor="middle" font-size="13" fill="#6b7585" class="d-muted">Cumulative cost</text>
  </g>

  <!-- METERED CLOUD: steady steep climb from origin, grey -->
  <path class="d-grey" d="M80 340 L680 96" stroke="#6b7585" stroke-width="2.25" fill="none" />
  <!-- a faint continuation hint past the frame edge -->
  <circle class="d-grey-dot" cx="680" cy="96" r="3.75" fill="#6b7585" />

  <!-- OWNED / COLOCATED: upfront step (capex) then near-flat slope, forest -->
  <path class="d-accent-line" d="M80 340 L80 226 L150 222 L680 196" stroke="#0d3b2e" stroke-width="2.5" fill="none" stroke-linejoin="round" />
  <!-- mark the upfront step -->
  <g class="d-accent" fill="#0d3b2e">
    <circle cx="80" cy="226" r="3.75" />
  </g>
  <text x="94" y="232" font-size="12" fill="#6b7585" class="d-muted">Upfront, the box you own</text>

  <!-- CROSSOVER: where the grey cloud line meets the forest owned line, at the
       verified intersection (400,210). Marked qualitatively, no number. -->
  <g class="d-cross">
    <line x1="400" y1="210" x2="400" y2="340" stroke="#0d3b2e" stroke-width="1" stroke-dasharray="2 4" opacity="0.5" class="d-accent-dash" />
    <circle cx="400" cy="210" r="6.5" fill="#f8f7f4" stroke="#0d3b2e" stroke-width="2" class="d-accent-ring" />
    <circle cx="400" cy="210" r="2.25" fill="#0d3b2e" class="d-accent" />
    <text x="412" y="200" font-size="13.5" font-weight="600" fill="#0d3b2e" class="d-accent-text">Breakeven</text>
    <text x="412" y="218" font-size="12" fill="#6b7585" class="d-muted">after this, owning costs less</text>
  </g>

  <!-- inline legend (direct labels, no detached key) -->
  <g font-size="13.5" font-weight="600">
    <text x="556" y="116" fill="#6b7585" class="d-muted">Metered cloud</text>
    <text x="512" y="184" fill="#0d3b2e" class="d-accent-text">Owned hardware</text>
  </g>
</svg>
