<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Hive mark">
  <rect width="64" height="64" fill="#f8f7f4"/>
  <!-- Single structural cell: pointy-top hexagon as an enclosure/shelter -->
  <polygon points="32,9 52,20.5 52,43.5 32,55 12,43.5 12,20.5"
           fill="none" stroke="#0d3b2e" stroke-width="5" stroke-linejoin="round"/>
  <!-- Keystone: vertical bar anchoring the cell, evoking a sealed core -->
  <rect x="29" y="24" width="6" height="16" rx="3" fill="#0d3b2e"/>
</svg>
