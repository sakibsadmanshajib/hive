<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Hive mark">
  <rect width="64" height="64" fill="#f8f7f4"/>
  <!-- Outer sovereign vault: rounded square enclosure -->
  <rect x="12" y="12" width="40" height="40" rx="10"
        fill="none" stroke="#0d3b2e" stroke-width="5"/>
  <!-- Inner cell: the single contained unit -->
  <rect x="26" y="26" width="12" height="12" rx="3" fill="#0d3b2e"/>
</svg>
