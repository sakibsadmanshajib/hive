openapi: 3.1.0
info:
  title: BD AI Gateway API
  version: 0.1.0
  description: OpenAI-compatible multi-provider AI gateway with prepaid credits.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Server health
  /v1/models:
    get:
      summary: List available models
      responses:
        "200":
          description: Models list
  /v1/chat/completions:
    post:
      summary: OpenAI-compatible chat completion
      parameters:
        - in: header
          name: x-api-key
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Chat completion result
          headers:
            x-model-routed:
              schema:
                type: string
            x-routing-policy-version:
              schema:
                type: string
            x-estimated-credits:
              schema:
                type: string
            x-actual-credits:
              schema:
                type: string
  /v1/responses:
    post:
      summary: OpenAI-compatible responses endpoint
      parameters:
        - in: header
          name: x-api-key
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Response payload
  /v1/images/generations:
    post:
      summary: OpenAI-compatible image generation endpoint
      parameters:
        - in: header
          name: x-api-key
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Generated image metadata
          headers:
            x-actual-credits:
              schema:
                type: string
  /v1/credits/balance:
    get:
      summary: Get user credit and refund balance
      parameters:
        - in: header
          name: x-api-key
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Credit balance and refundable quote
  /v1/usage:
    get:
      summary: List usage events for key owner
      parameters:
        - in: header
          name: x-api-key
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Usage list
  /v1/payments/intents:
    post:
      summary: Create top-up payment intent
      responses:
        "201":
          description: Payment intent created
  /v1/payments/webhook:
    post:
      summary: Handle verified payment callbacks
      responses:
        "200":
          description: Webhook accepted
