name: hive

services:
  edge-api:
    image: hive-edge-api:ci
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.edge-api
    ports:
      - "8080:8080"
    depends_on:
      control-plane:
        condition: service_healthy
    volumes:
      - gomodcache:/go/pkg/mod
      - gobuildcache:/root/.cache/go-build
    environment:
      EDGE_CONTROL_PLANE_BASE_URL: ${EDGE_CONTROL_PLANE_BASE_URL:-http://control-plane:8081}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-http://litellm:4000}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-litellm-dev-key}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SUPABASE_DB_URL: ${SUPABASE_DB_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION}
      S3_USE_SSL: ${S3_USE_SSL:-true}
      S3_BUCKET_IMAGES: ${S3_BUCKET_IMAGES:-hive-images}
      S3_BUCKET_FILES: ${S3_BUCKET_FILES:-hive-files}
      SUPABASE_JWT_ISSUER: ${SUPABASE_JWT_ISSUER:-}
      SUPABASE_JWT_AUDIENCE: ${SUPABASE_JWT_AUDIENCE:-authenticated}
      SUPABASE_JWKS_URL: ${SUPABASE_JWKS_URL:-}
      OWUI_SHIM_KEY: ${OWUI_SHIM_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 120s

  toolchain:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.toolchain
    profiles:
      - tools
    volumes:
      - ../../:/workspace
      - gomodcache:/go/pkg/mod

  litellm:
    image: ${LITELLM_IMAGE:-ghcr.io/berriai/litellm:v1.77.7-stable}
    ports:
      - "4000:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-litellm-dev-key}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENROUTER_DEFAULT_MODEL: ${OPENROUTER_DEFAULT_MODEL}
      OPENROUTER_AUTO_MODEL: ${OPENROUTER_AUTO_MODEL}
      OPENROUTER_FAST_FALLBACK_MODEL: ${OPENROUTER_FAST_FALLBACK_MODEL}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL}
      OPENROUTER_EMBEDDING_FALLBACK_MODEL: ${OPENROUTER_EMBEDDING_FALLBACK_MODEL}
      GROQ_FAST_MODEL: ${GROQ_FAST_MODEL}
      GROQ_REASONING_MODEL: ${GROQ_REASONING_MODEL}
      NVIDIA_NIM_API_KEY: ${NVIDIA_NIM_API_KEY}
      NVIDIA_NIM_EMBEDDING_MODEL: ${NVIDIA_NIM_EMBEDDING_MODEL}
    volumes:
      - ../../deploy/litellm/config.yaml:/app/config.yaml
    command: ["--config=/app/config.yaml"]

  sdk-tests-js:
    image: hive-sdk-tests-js:ci
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.sdk-tests-js
    profiles:
      - test
    depends_on:
      edge-api:
        condition: service_healthy
    environment:
      HIVE_BASE_URL: http://edge-api:8080/v1
      HIVE_API_KEY: ${HIVE_API_KEY:-}

  sdk-tests-py:
    image: hive-sdk-tests-py:ci
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.sdk-tests-py
    profiles:
      - test
    depends_on:
      edge-api:
        condition: service_healthy
    environment:
      HIVE_BASE_URL: http://edge-api:8080/v1
      HIVE_API_KEY: ${HIVE_API_KEY:-}

  sdk-tests-java:
    image: hive-sdk-tests-java:ci
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.sdk-tests-java
    profiles:
      - test
    depends_on:
      edge-api:
        condition: service_healthy
    environment:
      HIVE_BASE_URL: http://edge-api:8080/v1
      HIVE_API_KEY: ${HIVE_API_KEY:-}

  control-plane:
    image: hive-control-plane:ci
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.control-plane
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - gomodcache:/go/pkg/mod
      - gobuildcache:/root/.cache/go-build
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_DB_URL: ${SUPABASE_DB_URL}
      REDIS_URL: ${REDIS_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION}
      S3_BUCKET_FILES: ${S3_BUCKET_FILES:-hive-files}
      CONTROL_PLANE_PORT: ${CONTROL_PLANE_PORT:-8081}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      BKASH_APP_KEY: ${BKASH_APP_KEY:-}
      BKASH_APP_SECRET: ${BKASH_APP_SECRET:-}
      BKASH_USERNAME: ${BKASH_USERNAME:-}
      BKASH_PASSWORD: ${BKASH_PASSWORD:-}
      BKASH_BASE_URL: ${BKASH_BASE_URL:-}
      SSLCOMMERZ_STORE_ID: ${SSLCOMMERZ_STORE_ID:-}
      SSLCOMMERZ_STORE_PASSWD: ${SSLCOMMERZ_STORE_PASSWD:-}
      SSLCOMMERZ_BASE_URL: ${SSLCOMMERZ_BASE_URL:-}
      XE_ACCOUNT_ID: ${XE_ACCOUNT_ID:-}
      XE_API_KEY: ${XE_API_KEY:-}
      CONTROL_PLANE_PUBLIC_URL: ${CONTROL_PLANE_PUBLIC_URL:-http://localhost:8081}
      OWUI_BASE_URL: ${OWUI_BASE_URL:-http://open-webui:8080}
      OWUI_ADMIN_TOKEN: ${OWUI_ADMIN_TOKEN:-}
      SUPABASE_WEBHOOK_SECRET: ${SUPABASE_WEBHOOK_SECRET:-}
      AUDIT_WAL_DIR: ${AUDIT_WAL_DIR:-/var/lib/hive/audit-wal}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 120s

  # Local-dev Redis only. Staging + production use Upstash via REDIS_URL.
  # Gated to `local` and `test` profiles so a bare `docker compose up`
  # (or any deploy that doesn't opt in) never starts a docker redis. Local
  # dev: `docker compose --profile local up`. SDK tests: also activate
  # `--profile test` so the redis dependency resolves for sdk-tests-*
  # services.
  redis:
    image: redis:8.4-alpine
    profiles:
      - local
      - test
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web-console:
    image: hive-web-console:ci
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.web-console
    ports:
      - "3000:3000"
    depends_on:
      - control-plane
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      CONTROL_PLANE_BASE_URL: http://control-plane:8081

  # Hive Phase 19 — Open WebUI front-end for EnterpriseEdge users.
  open-webui:
    image: ghcr.io/open-webui/open-webui:main@sha256:74093dadc9c6aabc23987a74fd8c2fb8d995b1a5b22e83b0036fb9d6af590e8c
    profiles:
      - local
    ports:
      - "3002:8080"
    depends_on:
      edge-api:
        condition: service_healthy
      control-plane:
        condition: service_healthy
    environment:
      ENABLE_SIGNUP: "false"
      ENABLE_OAUTH_SIGNUP: "true"
      OAUTH_PROVIDER_NAME: "Hive"
      OPENID_PROVIDER_URL: "${SUPABASE_URL}/auth/v1/.well-known/openid-configuration"
      OAUTH_CLIENT_ID: ${SUPABASE_OAUTH_CLIENT_ID:-}
      OAUTH_CLIENT_SECRET: ${SUPABASE_OAUTH_CLIENT_SECRET:-}
      OAUTH_SCOPES: "openid email profile"
      ENABLE_OAUTH_ROLE_MANAGEMENT: "true"
      OAUTH_ROLES_CLAIM: "role"
      OAUTH_ALLOWED_ROLES: "ADMIN,MEMBER,VIEWER"
      OAUTH_ADMIN_ROLES: "ADMIN"
      ENABLE_OAUTH_GROUP_MANAGEMENT: "true"
      OAUTH_GROUPS_CLAIM: "tenants"
      DEFAULT_USER_ROLE: "MEMBER"
      ENABLE_ADMIN_PANEL: "false"
      ENABLE_ADMIN_EXPORT: "false"
      ENABLE_COMMUNITY_SHARING: "false"
      ENABLE_MODEL_FILTER: "true"
      ENABLE_EVALUATION_ARENA_MODELS: "false"
      # Hive product branding. LICENSE-DECISION.md: latest Open WebUI image with
      # WEBUI_NAME and visible surfaces overridden to "Hive"; upstream Open WebUI
      # branding-preservation license risk is accepted by the project owner.
      WEBUI_NAME: "Hive"
      WEBUI_URL: ${HIVE_CHAT_URL:-http://localhost:3003}
      DEFAULT_LOCALE: "en"
      OPENAI_API_BASE_URL: "http://edge-api:8080/v1"
      # OWUI_SHIM_KEY MUST be set when the open-webui profile is active. The
      # edge-api OWUI unwrap middleware only fires when this value matches
      # exactly; an empty/unset value disables the middleware and OWUI
      # traffic will 401. Generate: openssl rand -base64 32
      OPENAI_API_KEY: ${OWUI_SHIM_KEY:-}
      ENABLE_OPENAI_API: "true"
      ENABLE_OLLAMA_API: "false"
      RAG_EMBEDDING_ENGINE: "openai"
      RAG_OPENAI_API_BASE_URL: "http://edge-api:8080/v1"
      RAG_OPENAI_API_KEY: ${OWUI_SHIM_KEY:-}
      RAG_EMBEDDING_MODEL: "text-embedding-3-small"
      VECTOR_DB: "pgvector"
      PGVECTOR_DB_URL: ${SUPABASE_DB_URL:-}
      RAG_TOP_K: "5"
      ENABLE_RAG_HYBRID_SEARCH: "true"
      ENABLE_PIPELINES: "true"
      PIPELINES_URLS: "/app/pipelines/hive_jwt_forward.py"
      DATA_DIR: "/data"
      STATIC_DIR: "/data/static"
      OWUI_E2E_MODE: ${OWUI_E2E_MODE:-false}
    volumes:
      - owui-data:/data
      - ./pipelines:/app/pipelines:ro
    healthcheck:
      test: ["CMD", "curl", "-fsSL", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  caddy-owui:
    image: caddy:2-alpine@sha256:86deaf5e3d3408a6ccec08fbb79989783dd26e206ae10bcf78a801dc8c9ab794
    profiles:
      - local
    ports:
      - "3003:80"
    depends_on:
      open-webui:
        condition: service_healthy
    volumes:
      - ./Caddyfile.owui:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    profiles:
      - monitoring
    ports:
      - "9090:9090"
    volumes:
      - ../../deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../deploy/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
  grafana:
    image: grafana/grafana:latest
    profiles:
      - monitoring
    ports:
      - "3001:3000"
    volumes:
      - ../../deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      # Grafana admin creds are operator-provided. The previous
      # `admin/admin` default left an unauthenticated panel on any
      # environment that forgot to override them. The placeholder defaults
      # below are intentionally non-functional — Grafana refuses to log in
      # with empty values, so an operator that forgets to override these
      # in .env will see an obvious failure rather than a silent default.
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    depends_on:
      - prometheus

  alertmanager:
    image: prom/alertmanager:latest
    profiles:
      - monitoring
    ports:
      - "9093:9093"
    volumes:
      - ../../deploy/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'

volumes:
  gomodcache:
  gobuildcache:
  prometheus-data:
  grafana-data:
  owui-data:
  caddy-data:
  caddy-config:
