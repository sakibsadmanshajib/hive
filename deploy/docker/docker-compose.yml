name: hive

services:
  edge-api:
    image: hive-edge-api:ci
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.edge-api
    ports:
      - "8080:8080"
    depends_on:
      control-plane:
        condition: service_healthy
    volumes:
      - gomodcache:/go/pkg/mod
      - gobuildcache:/root/.cache/go-build
    environment:
      EDGE_CONTROL_PLANE_BASE_URL: ${EDGE_CONTROL_PLANE_BASE_URL:-http://control-plane:8081}
      CONTROL_PLANE_INTERNAL_TOKEN: ${CONTROL_PLANE_INTERNAL_TOKEN:-hive-local-internal-token}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-http://litellm:4000}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-litellm-dev-key}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # SUPABASE_DB_URL: For the enterprise profile set this to the local DSN:
      #   postgres://postgres:<ENTERPRISE_DB_PASSWORD>@supabase-db:5432/postgres
      # For cloud/local profiles set this to the hosted Supabase DB URL.
      SUPABASE_DB_URL: ${SUPABASE_DB_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION}
      S3_USE_SSL: ${S3_USE_SSL:-true}
      S3_BUCKET_IMAGES: ${S3_BUCKET_IMAGES:-hive-images}
      S3_BUCKET_FILES: ${S3_BUCKET_FILES:-hive-files}
      # SUPABASE_JWT_ISSUER / SUPABASE_JWKS_URL: For the enterprise profile set
      # these to the local GoTrue service:
      #   SUPABASE_JWT_ISSUER=http://supabase-auth:9999
      #   SUPABASE_JWKS_URL=http://supabase-auth:9999/.well-known/jwks.json
      # For cloud/local profiles set these to the hosted Supabase auth URLs.
      SUPABASE_JWT_ISSUER: ${SUPABASE_JWT_ISSUER:-}
      SUPABASE_JWT_AUDIENCE: ${SUPABASE_JWT_AUDIENCE:-authenticated}
      SUPABASE_JWKS_URL: ${SUPABASE_JWKS_URL:-}
      OWUI_SHIM_KEY: ${OWUI_SHIM_KEY:-}
      # RAG query embeddings (#232). Without these the query embedder is nil and
      # POST /v1/rag/search + /v1/rag/chat return a provider-blind 503. The demo
      # uses SERVERLESS embeddings only (no local embedding model runs): point at
      # LiteLLM, whose route-openrouter-embedding-fallback forwards to OpenRouter's
      # qwen3-embedding-8b (MRL-trained, native 4096-dim). The embedder appends
      # /v1/embeddings, so the base URL must NOT itself include /v1.
      # rag_chunks.embedding is vector(1024) NOT NULL (see EmbeddingDimension in
      # apps/edge-api/internal/rag/types.go); neither serverless route natively
      # returns 1024, and LiteLLM's `dimensions` request param is rejected by
      # this proxy config even with drop_params set, so EMBEDDING_TRUNCATE_TO
      # reduces the vector client-side (MRL truncation + L2 renormalize) instead
      # of asking the provider for a narrower width. Only qwen3 is MRL-verified;
      # the free Nemotron primary is NOT used here for that reason, even though
      # LiteLLM would fall back to it on qwen3 failure.
      # Provider-swappable with no schema change: override in .env
      # (e.g. http://ollama:11434 + bge-m3 + EMBEDDING_TRUNCATE_TO=0 for the
      # enterprise profile's in-stack Ollama, which returns native 1024-dim).
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-http://litellm:4000}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-route-openrouter-embedding-fallback}
      EMBEDDING_TRUNCATE_TO: ${EMBEDDING_TRUNCATE_TO:-1024}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 120s

  agent-engine:
    image: hive-agent-engine:ci
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.agent-engine
    profiles:
      - agent
    # This container builds and runs the Go control binary (quota, egress
    # allowlist enforcement, apptainer argv construction) only. It does not
    # bundle the `apptainer` binary or a rootless user-namespace: Apptainer
    # rootless sandboxes are launched by this binary on the linux/amd64 host
    # it runs on in production, not nested inside another container. In this
    # repo's dev environment (WSL2) `apptainer` is unavailable, so sandbox
    # launches here fail at the `exec.LookPath("apptainer")` step; see
    # apps/agent-engine/internal/sandbox/apptainer_integration_test.go
    # (HIVE_APPTAINER_TEST=1) for the gated live-launch proof.
    volumes:
      - gomodcache:/go/pkg/mod
      - gobuildcache:/root/.cache/go-build
    environment:
      CONTROL_PLANE_URL: ${CONTROL_PLANE_URL:-http://control-plane:8081}
      CONTROL_PLANE_INTERNAL_TOKEN: ${CONTROL_PLANE_INTERNAL_TOKEN:-hive-local-internal-token}
      # Local/dev only: agent-engine refuses to start with the known default
      # token unless this is set (see cmd/agent-engine/main.go).
      HIVE_AGENT_ENGINE_ALLOW_DEFAULT_TOKEN: ${HIVE_AGENT_ENGINE_ALLOW_DEFAULT_TOKEN:-1}
      HIVE_AGENT_SIF_PATH: ${HIVE_AGENT_SIF_PATH:-}
      HIVE_QUOTA_TENANT_CONCURRENCY: ${HIVE_QUOTA_TENANT_CONCURRENCY:-4}
      HIVE_QUOTA_USER_CONCURRENCY: ${HIVE_QUOTA_USER_CONCURRENCY:-2}
    depends_on:
      control-plane:
        condition: service_healthy

  toolchain:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.toolchain
    profiles:
      - tools
    volumes:
      - ../../:/workspace
      - gomodcache:/go/pkg/mod

  litellm:
    image: ${LITELLM_IMAGE:-ghcr.io/berriai/litellm:v1.77.7-stable}
    # Fixed container name so the control-plane Docker restart API can locate
    # this container by name regardless of the Compose project name.
    container_name: litellm
    ports:
      - "4000:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-litellm-dev-key}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENROUTER_DEFAULT_MODEL: ${OPENROUTER_DEFAULT_MODEL}
      OPENROUTER_AUTO_MODEL: ${OPENROUTER_AUTO_MODEL}
      OPENROUTER_FAST_FALLBACK_MODEL: ${OPENROUTER_FAST_FALLBACK_MODEL}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL}
      OPENROUTER_EMBEDDING_FALLBACK_MODEL: ${OPENROUTER_EMBEDDING_FALLBACK_MODEL}
      GROQ_FAST_MODEL: ${GROQ_FAST_MODEL}
      GROQ_REASONING_MODEL: ${GROQ_REASONING_MODEL}
      # EnterpriseEdge: set to http://ollama:11434 when using the enterprise
      # profile with the in-stack Ollama service. Consumed by the commented
      # ollama_chat/ model entries in deploy/litellm/config.yaml.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
    volumes:
      # Phase 20 Plan 03 — shared config volume: control-plane writes here,
      # LiteLLM reads from it. The volume persists generated config across
      # container recreates; the seed file is copied in on first start.
      - litellm-config:/etc/litellm
      # Mount the repo seed config read-only so the entrypoint can copy it
      # into the shared volume when the volume is empty (first boot).
      - ../../deploy/litellm/config.yaml:/seed/config.yaml:ro
    # On first boot the shared volume is empty; copy the seed config so LiteLLM
    # has a valid config.yaml before control-plane pushes its first sync.
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ ! -f /etc/litellm/config.yaml ]; then
          cp /seed/config.yaml /etc/litellm/config.yaml
        fi
        exec litellm --config=/etc/litellm/config.yaml
    command: []

  sdk-tests-js:
    image: hive-sdk-tests-js:ci
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.sdk-tests-js
    profiles:
      - test
    depends_on:
      edge-api:
        condition: service_healthy
    environment:
      HIVE_BASE_URL: http://edge-api:8080/v1
      HIVE_API_KEY: ${HIVE_API_KEY:-}

  sdk-tests-py:
    image: hive-sdk-tests-py:ci
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.sdk-tests-py
    profiles:
      - test
    depends_on:
      edge-api:
        condition: service_healthy
    environment:
      HIVE_BASE_URL: http://edge-api:8080/v1
      HIVE_API_KEY: ${HIVE_API_KEY:-}

  sdk-tests-java:
    image: hive-sdk-tests-java:ci
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.sdk-tests-java
    profiles:
      - test
    depends_on:
      edge-api:
        condition: service_healthy
    environment:
      HIVE_BASE_URL: http://edge-api:8080/v1
      HIVE_API_KEY: ${HIVE_API_KEY:-}

  control-plane:
    image: hive-control-plane:ci
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.control-plane
    ports:
      - "8081:8081"
    # `required: false` makes the redis dependency optional at the Compose
    # level. When the `local` or `enterprise` profile is active the in-stack
    # redis service exists and control-plane waits for it to be healthy before
    # starting, preventing a race where control-plane pings Redis once at boot
    # and permanently marks redisClient=nil on a miss. When the `cloud` profile
    # is active there is no in-stack redis service, so Compose skips the
    # dependency entirely and control-plane connects via the managed REDIS_URL.
    depends_on:
      redis:
        condition: service_healthy
        required: false
    volumes:
      - gomodcache:/go/pkg/mod
      - gobuildcache:/root/.cache/go-build
      # Phase 20 Plan 03 — shared LiteLLM config volume (control-plane writes,
      # LiteLLM reads). Mount read-write so control-plane can write atomically.
      - litellm-config:/etc/litellm
      # Docker socket mount (read-write required — the restart API needs write
      # access). control-plane calls POST /containers/<name>/restart over the
      # Unix socket directly via net/http; no docker CLI binary is needed.
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # SUPABASE_URL / SUPABASE_ANON_KEY / SUPABASE_SERVICE_ROLE_KEY:
      # Enterprise profile: SUPABASE_URL must point at GoTrue, not PostgREST.
      # control-plane calls GET /auth/v1/user on this URL; PostgREST cannot serve auth routes.
      #   SUPABASE_URL=http://supabase-auth:9999
      #   SUPABASE_ANON_KEY=<ENTERPRISE_ANON_KEY>
      #   SUPABASE_SERVICE_ROLE_KEY=<ENTERPRISE_SERVICE_ROLE_KEY>
      # Cloud/local profiles: set these to the hosted Supabase project values.
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      # Enterprise profile: set to local Postgres DSN:
      #   postgres://postgres:<ENTERPRISE_DB_PASSWORD>@supabase-db:5432/postgres
      SUPABASE_DB_URL: ${SUPABASE_DB_URL}
      REDIS_URL: ${REDIS_URL}
      # Enterprise profile: set to local Storage endpoint:
      #   S3_ENDPOINT=http://supabase-storage:5000/storage/v1/s3
      #   S3_ACCESS_KEY=<ENTERPRISE_SERVICE_ROLE_KEY>
      #   S3_SECRET_KEY=<ENTERPRISE_SERVICE_ROLE_KEY>
      #   S3_REGION=local
      #   S3_USE_SSL=false  (internal compose network, no TLS)
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION}
      S3_BUCKET_FILES: ${S3_BUCKET_FILES:-hive-files}
      CONTROL_PLANE_PORT: ${CONTROL_PLANE_PORT:-8081}
      CONTROL_PLANE_INTERNAL_TOKEN: ${CONTROL_PLANE_INTERNAL_TOKEN:-hive-local-internal-token}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      BKASH_APP_KEY: ${BKASH_APP_KEY:-}
      BKASH_APP_SECRET: ${BKASH_APP_SECRET:-}
      BKASH_USERNAME: ${BKASH_USERNAME:-}
      BKASH_PASSWORD: ${BKASH_PASSWORD:-}
      BKASH_BASE_URL: ${BKASH_BASE_URL:-}
      SSLCOMMERZ_STORE_ID: ${SSLCOMMERZ_STORE_ID:-}
      SSLCOMMERZ_STORE_PASSWD: ${SSLCOMMERZ_STORE_PASSWD:-}
      SSLCOMMERZ_BASE_URL: ${SSLCOMMERZ_BASE_URL:-}
      XE_ACCOUNT_ID: ${XE_ACCOUNT_ID:-}
      XE_API_KEY: ${XE_API_KEY:-}
      CONTROL_PLANE_PUBLIC_URL: ${CONTROL_PLANE_PUBLIC_URL:-http://localhost:8081}
      OWUI_BASE_URL: ${OWUI_BASE_URL:-http://open-webui:8080}
      OWUI_ADMIN_TOKEN: ${OWUI_ADMIN_TOKEN:-}
      SUPABASE_WEBHOOK_SECRET: ${SUPABASE_WEBHOOK_SECRET:-}
      AUDIT_WAL_DIR: ${AUDIT_WAL_DIR:-/var/lib/hive/audit-wal}
      # RAG ingestion (#232). Without EMBEDDING_BASE_URL the ingest route is not
      # registered and uploaded documents stay "pending" forever. Must match the
      # edge-api query embedder (same model + same truncation) or search/chat
      # retrieval silently returns nothing, since ingested and query vectors
      # would live in incompatible embedding spaces. See the edge-api service's
      # EMBEDDING_* comment above for why EMBEDDING_TRUNCATE_TO exists.
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-http://litellm:4000}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-route-openrouter-embedding-fallback}
      EMBEDDING_TRUNCATE_TO: ${EMBEDDING_TRUNCATE_TO:-1024}
      # Phase 20 Plan 03 — LiteLLM config generation and controlled restart.
      LITELLM_CONTAINER_NAME: ${LITELLM_CONTAINER_NAME:-litellm}
      LITELLM_CONFIG_PATH: ${LITELLM_CONFIG_PATH:-/etc/litellm/config.yaml}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-litellm-dev-key}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 120s

  # ──────────────────────────────────────────────────────────────────────────
  # EnterpriseEdge: Self-hosted Supabase data plane (issue #231)
  #
  # The five Supabase services (supabase-db, supabase-auth, supabase-rest,
  # supabase-storage, supabase-init) are defined in the companion override
  # file docker-compose.enterprise.yml. They are kept in a separate file
  # because Docker Compose evaluates ALL environment variable interpolations
  # in ALL services regardless of which profile is active, so :? guards in
  # enterprise-only services would break `--profile local` and `--profile cloud`
  # config validation for operators who have not set ENTERPRISE_* vars.
  #
  # To bring up the full enterprise stack:
  #   docker compose \
  #     -f docker-compose.yml \
  #     -f docker-compose.enterprise.yml \
  #     --profile enterprise up --build
  #
  # The installer (scripts/install.sh) passes both -f flags automatically when
  # the enterprise profile is selected.
  # ──────────────────────────────────────────────────────────────────────────

  # In-stack Redis. Active for local dev, SDK tests, and self-hosted
  # enterprise deployments. Cloud deployments use managed Upstash via
  # REDIS_URL and do NOT activate this service.
  # Profiles:
  #   local      - in-stack dev redis. Run: docker compose --profile local up
  #   test       - SDK integration tests need the redis dependency resolved.
  #   enterprise - Hive EnterpriseEdge self-hosted box includes in-stack redis.
  redis:
    image: redis:8.4-alpine
    profiles:
      - local
      - test
      - enterprise
    # Bind to loopback only. Local devs can still reach redis on 127.0.0.1:6379
    # for debugging. Enterprise deployments do not expose Redis on all host
    # interfaces; no TLS or password is configured on this service, so a
    # network-reachable port would be an unauthenticated attack surface.
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web-console:
    image: hive-web-console:ci
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.web-console
    ports:
      - "3000:3000"
    depends_on:
      - control-plane
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      CONTROL_PLANE_BASE_URL: http://control-plane:8081

  # Blueprint Step 3.1 (#311, #305) — standalone agent console sidecar.
  # Ratified 2026-07-16: extends nothing in Open WebUI; OWUI stays a pinned
  # upstream image. Reached only through caddy-owui's /agent-workspace/*
  # route (Caddyfile.owui) alongside OWUI on port 3003 -- no direct host
  # port here, same posture as open-webui below.
  agent-console:
    image: hive-agent-console:ci
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.agent-console
      # NEXT_PUBLIC_* are baked into the client bundle by `next build`
      # (Dockerfile.agent-console runs a production build, not `next dev`),
      # so they must travel as build args, not runtime `environment:`.
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_EDGE_API_BASE_URL: ${NEXT_PUBLIC_EDGE_API_BASE_URL:-http://localhost:8080}
    profiles:
      - chat
      - enterprise
    depends_on:
      edge-api:
        condition: service_healthy
    environment:
      EDGE_API_INTERNAL_BASE_URL: http://edge-api:8080

  # Hive Phase 19 — Open WebUI front-end for EnterpriseEdge and cloud chat users.
  # Profiles:
  #   local      - developer laptop with in-stack redis.
  #   enterprise - Hive EnterpriseEdge self-hosted box (includes in-stack redis + Ollama).
  #   chat       - compose on top of cloud profile for a hosted chat front-end.
  open-webui:
    image: ghcr.io/open-webui/open-webui:main@sha256:74093dadc9c6aabc23987a74fd8c2fb8d995b1a5b22e83b0036fb9d6af590e8c
    profiles:
      - local
      - enterprise
      - chat
    # No direct host-port binding. All external access goes through caddy-owui
    # on port 3003, which enforces admin/signup/mutation guards defined in
    # Caddyfile.owui. Exposing port 3002 directly would bypass those defences
    # on enterprise and cloud deployments.
    depends_on:
      edge-api:
        condition: service_healthy
      control-plane:
        condition: service_healthy
    environment:
      ENABLE_SIGNUP: "false"
      ENABLE_OAUTH_SIGNUP: "true"
      OAUTH_PROVIDER_NAME: "Hive"
      OPENID_PROVIDER_URL: "${SUPABASE_URL}/auth/v1/.well-known/openid-configuration"
      OAUTH_CLIENT_ID: ${SUPABASE_OAUTH_CLIENT_ID:-}
      OAUTH_CLIENT_SECRET: ${SUPABASE_OAUTH_CLIENT_SECRET:-}
      OAUTH_SCOPES: "openid email profile"
      # Supabase's OAuth 2.1 authorization server requires PKCE on every
      # authorize request. authlib (OWUI's OAuth client) only sends
      # code_challenge/code_challenge_method when this is set, so without it
      # Supabase 302s straight back with error=invalid_request.
      OAUTH_CODE_CHALLENGE_METHOD: "S256"
      ENABLE_OAUTH_ROLE_MANAGEMENT: "true"
      OAUTH_ROLES_CLAIM: "role"
      OAUTH_ALLOWED_ROLES: "ADMIN,MEMBER,VIEWER"
      OAUTH_ADMIN_ROLES: "ADMIN"
      ENABLE_OAUTH_GROUP_MANAGEMENT: "true"
      OAUTH_GROUPS_CLAIM: "tenants"
      DEFAULT_USER_ROLE: "MEMBER"
      ENABLE_ADMIN_PANEL: "false"
      ENABLE_ADMIN_EXPORT: "false"
      ENABLE_COMMUNITY_SHARING: "false"
      ENABLE_MODEL_FILTER: "true"
      ENABLE_EVALUATION_ARENA_MODELS: "false"
      # Hive product branding. LICENSE-DECISION.md: latest Open WebUI image with
      # WEBUI_NAME and visible surfaces overridden to "Hive"; upstream Open WebUI
      # branding-preservation license risk is accepted by the project owner.
      WEBUI_NAME: "Hive"
      WEBUI_URL: ${HIVE_CHAT_URL:-http://localhost:3003}
      DEFAULT_LOCALE: "en"
      OPENAI_API_BASE_URL: "http://edge-api:8080/v1"
      # OWUI_SHIM_KEY MUST be set when the open-webui profile is active. The
      # edge-api OWUI unwrap middleware only fires when this value matches
      # exactly; an empty/unset value disables the middleware and OWUI
      # traffic will 401. Generate: openssl rand -base64 32
      OPENAI_API_KEY: ${OWUI_SHIM_KEY:-}
      ENABLE_OPENAI_API: "true"
      ENABLE_OLLAMA_API: "false"
      RAG_EMBEDDING_ENGINE: "openai"
      RAG_OPENAI_API_BASE_URL: "http://edge-api:8080/v1"
      RAG_OPENAI_API_KEY: ${OWUI_SHIM_KEY:-}
      RAG_EMBEDDING_MODEL: "text-embedding-3-small"
      VECTOR_DB: "pgvector"
      PGVECTOR_DB_URL: ${SUPABASE_DB_URL:-}
      RAG_TOP_K: "5"
      ENABLE_RAG_HYBRID_SEARCH: "true"
      DATA_DIR: "/data"
      STATIC_DIR: "/data/static"
      OWUI_E2E_MODE: ${OWUI_E2E_MODE:-false}
    volumes:
      - owui-data:/data
      # NOTE (#269): ENABLE_PIPELINES/PIPELINES_URLS and a mounted
      # ./pipelines volume used to sit here. Those are not real Open WebUI
      # config keys on this image; they belong to the separate, deprecated
      # "Pipelines" microservice (ghcr.io/open-webui/pipelines), which this
      # compose file never runs. deploy/docker/pipelines/hive_jwt_forward.py
      # was therefore never loaded. It is installed instead as a native Open
      # WebUI Function via the Functions REST API (Admin > Functions),
      # which requires an authenticated admin session and cannot run at
      # container boot with no user yet signed in. CI installs it from
      # apps/web-console/e2e/phase-19/owui/owui.setup.ts right after the
      # e2e user's first OIDC login (which auto-promotes to admin as the
      # first user). Production/EnterpriseEdge deployments must install it
      # once via the same API after the first admin signs in; see that
      # file for the request shape. Tracked as follow-up: automate this for
      # non-CI deployments too.
    healthcheck:
      test: ["CMD", "curl", "-fsSL", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # M10: bounded resources so a runaway pipeline / RAG batch cannot
    # starve the rest of the local stack. Numbers picked from observed
    # peak under a 10-user soak; revisit if Phase 24 packaging shifts.
    mem_limit: 2g
    cpus: 2.0
    restart: unless-stopped

  caddy-owui:
    image: caddy:2-alpine@sha256:86deaf5e3d3408a6ccec08fbb79989783dd26e206ae10bcf78a801dc8c9ab794
    profiles:
      - local
      - enterprise
      - chat
    ports:
      - "3003:80"
    depends_on:
      open-webui:
        condition: service_healthy
    volumes:
      - ./Caddyfile.owui:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

  # Artifacts hosting (#312) -- separate container, separate origin
  # (ARTIFACTS_DOMAIN) from caddy-owui on purpose: the isolation guarantee
  # that a served artifact's HTML cannot read the main app's cookies or
  # session storage comes from the browser's same-origin policy, which only
  # holds if this never shares a host with HIVE_CHAT_URL/OWUI. Same image
  # and volume pattern as caddy-owui; own named volumes so cert/config state
  # never mixes between the two origins.
  caddy-artifacts:
    image: caddy:2-alpine@sha256:86deaf5e3d3408a6ccec08fbb79989783dd26e206ae10bcf78a801dc8c9ab794
    profiles:
      - local
      - enterprise
      - chat
    ports:
      - "3004:80"
    environment:
      ARTIFACTS_DOMAIN: ${ARTIFACTS_DOMAIN:-artifacts.localhost}
    depends_on:
      edge-api:
        condition: service_healthy
    volumes:
      - ./Caddyfile.artifacts:/etc/caddy/Caddyfile:ro
      - caddy-artifacts-data:/data
      - caddy-artifacts-config:/config
    restart: unless-stopped

  # Hive EnterpriseEdge — optional local Ollama inference backend.
  # Active only under the `enterprise` profile. Serves keyless local models
  # (e.g. llama3, mistral) via the Ollama HTTP API on port 11434.
  # OLLAMA_BASE_URL is passed to LiteLLM via the environment so the
  # ollama_chat/ model entries in deploy/litellm/config.yaml resolve
  # correctly. See the commented example block in config.yaml for how to
  # wire a local model into the LiteLLM model_list.
  # GPU passthrough: add a `deploy.resources.reservations.devices` block
  # to this service definition for NVIDIA GPU access (see Docker Compose
  # GPU docs). Not enabled here because the investor-demo box may be
  # CPU-only; add it after hardware is confirmed.
  ollama:
    image: ollama/ollama:latest
    profiles:
      - enterprise
    # No host-port binding. LiteLLM reaches Ollama over the internal Compose
    # network at http://ollama:11434. Exposing 11434 on the host would allow
    # unauthenticated inference calls that bypass Edge and LiteLLM auth.
    volumes:
      - ollama-models:/root/.ollama
    environment:
      OLLAMA_HOST: "0.0.0.0"
    healthcheck:
      # ollama/ollama image ships with the ollama binary but not curl.
      # `ollama list` exits 0 when the daemon is ready and returns the
      # loaded model catalogue; it is the canonical in-image liveness probe.
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Carl.sh Voice STT — Tier 1: Parakeet (English, fast, ONNX/CPU)
  # Active under the `voice` profile, composable with `enterprise`.
  # achetronic/parakeet: Go + ONNX Runtime, speaks OpenAI Whisper API on port
  # 5092, CPU-capable, ffmpeg in image for non-WAV audio.
  # Model files must be provided by the operator at PARAKEET_MODEL_DIR on the
  # host; the directory is mounted read-only at /models inside the container.
  # Port 5092 is NOT exposed on the host; LiteLLM reaches it over the internal
  # Compose network at http://parakeet:5092.
  # Bangla STT is NOT supported by parakeet-tdt-0.6b-v3; Bangla routes to
  # faster-whisper (see below). Do not claim Bangla ASR via this service.
  parakeet:
    image: achetronic/parakeet:latest
    profiles:
      - voice
    environment:
      # Bearer auth for the Parakeet API. Leave blank to run without auth
      # (acceptable on a private internal network; set for extra hardening).
      PARAKEET_API_KEY: ${PARAKEET_API_KEY:-}
    volumes:
      # Owner-provided model directory (parakeet-tdt-0.6b-v3 ONNX files).
      # Set PARAKEET_MODEL_DIR in .env to the host path before starting.
      - ${PARAKEET_MODEL_DIR:-/tmp/parakeet-models}:/models:ro
    # No host-port binding: internal network only.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5092/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Carl.sh Voice STT — Tier 2: faster-whisper (Bangla + multilingual)
  # Active under the `voice` profile, composable with `enterprise`.
  # Uses the faster-whisper server image which speaks the OpenAI Whisper API.
  # All languages except English route here, including Bangla ("bn") and
  # auto-detect (empty language field).
  # Port 8000 is NOT exposed on the host; the stt.TieredClient reaches it
  # over the internal Compose network at http://faster-whisper:8000.
  faster-whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    profiles:
      - voice
    environment:
      # Model to load at startup. large-v3 gives best Bangla accuracy.
      # Override to a smaller model (e.g. base, small) on low-memory boxes.
      WHISPER__MODEL: ${FASTER_WHISPER_MODEL:-large-v3}
    # No host-port binding: internal network only.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    profiles:
      - monitoring
    ports:
      - "9090:9090"
    volumes:
      - ../../deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../deploy/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
  grafana:
    image: grafana/grafana:latest
    profiles:
      - monitoring
    ports:
      - "3001:3000"
    volumes:
      - ../../deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      # Grafana admin creds are operator-provided. The previous
      # `admin/admin` default left an unauthenticated panel on any
      # environment that forgot to override them. The placeholder defaults
      # below are intentionally non-functional — Grafana refuses to log in
      # with empty values, so an operator that forgets to override these
      # in .env will see an obvious failure rather than a silent default.
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    depends_on:
      - prometheus

  alertmanager:
    image: prom/alertmanager:latest
    profiles:
      - monitoring
    ports:
      - "9093:9093"
    volumes:
      - ../../deploy/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'

volumes:
  gomodcache:
  gobuildcache:
  prometheus-data:
  grafana-data:
  owui-data:
  caddy-data:
  caddy-config:
  caddy-artifacts-data:
  caddy-artifacts-config:
  # ollama-models persists pulled model weights across container recreates.
  # Active only when the `enterprise` profile is used.
  ollama-models:
  # litellm-config is a shared volume between control-plane (writer) and litellm
  # (reader). control-plane generates config.yaml via POST /internal/litellm/sync
  # and writes it atomically; litellm reads it at startup and on restart.
  # Phase 20 Plan 03.
  litellm-config:
  # supabase-db-data and supabase-storage-data are declared in
  # docker-compose.enterprise.yml and only exist when that override is loaded.
