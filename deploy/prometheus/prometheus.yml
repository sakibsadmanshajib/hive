global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'control-plane'
    static_configs:
      - targets: ['control-plane:8081']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: 'edge-api'
    static_configs:
      - targets: ['edge-api:8080']
    metrics_path: /metrics
    scrape_interval: 10s
