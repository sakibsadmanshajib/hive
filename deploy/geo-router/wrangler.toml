# Hive geo-router Worker. Front both marketing zones with this route, then bind
# each Pages deployment as a service so the Worker reaches the origin without
# looping back through its own route.
name = "hive-geo-router"
main = "src/index.js"
compatibility_date = "2026-06-01"

# Bind the Worker to both apex hosts. The Worker decides per request whether to
# 302 to the other host or serve the matching origin.
routes = [
  { pattern = "hive.scubed.co/*", zone_name = "scubed.co" },
  { pattern = "hive.scubed.com.bd/*", zone_name = "scubed.com.bd" },
]

# Service bindings to the two Pages projects (origins). Set the service names to
# your actual Pages project names. These let the Worker fetch the origin without
# re-triggering its own route.
# [[services]]
# binding = "ORIGIN_SOV"
# service = "hive-sovereign"
# [[services]]
# binding = "ORIGIN_BD"
# service = "hive-bd"
