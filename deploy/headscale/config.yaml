# deploy/headscale/config.yaml
#
# Headscale control-server configuration for Hive EnterpriseEdge.
# Activated by: docker compose -f docker-compose.yml -f docker-compose.relay.yml --profile relay
#
# Licence: Headscale is BSD-3-Clause. No proprietary Tailscale SaaS components
# are used. All coordination and DERP relay traffic stays on the operator's box.
# Source: https://github.com/juanfont/headscale (BSD-3-Clause)
#
# Operator checklist before first run:
#   1. Set HEADSCALE_SERVER_URL in .env to the box's public URL or LAN address,
#      e.g. https://relay.example.com or http://192.168.1.10:8085
#   2. The embedded DERP relay uses tcp/443 (HTTPS) for relayed packets and
#      udp/3478 (STUN) for NAT discovery. Open these ports outbound on the
#      host firewall if clients are remote. No inbound port-forward is needed
#      for Tailscale clients; DERP is client-initiated outbound.
#   3. For production: put Headscale behind Caddy with a real TLS cert and set
#      HEADSCALE_SERVER_URL to the HTTPS address.
#   4. Preauthkeys are generated by the installer (scripts/install.sh --with-relay).
#      Rotate them via: headscale preauthkeys list

---
# Public URL that Tailscale clients use to reach this control server.
# Set HEADSCALE_SERVER_URL in .env.  Example: http://192.168.1.10:8085
# For production with Caddy TLS: https://relay.your-domain.com
server_url: "${HEADSCALE_SERVER_URL}"

# Bind address for the Headscale HTTP/gRPC listener inside the container.
listen_addr: "0.0.0.0:8085"
metrics_listen_addr: "0.0.0.0:9091"

# gRPC (used by the headscale CLI inside the container for admin operations).
grpc_listen_addr: "0.0.0.0:50443"
grpc_allow_insecure: true

# TLS: disabled inside the container.  Terminate TLS in Caddy and proxy to
# http://headscale:8085 for production.  For LAN-only installs, plain HTTP is
# acceptable on a trusted network segment.
tls_cert_path: ""
tls_key_path: ""

# IP address pool assigned to WireGuard peers.  Private range (CGNAT block).
ip_prefixes:
  - "100.64.0.0/10"

# DNS pushed to all peers.  Magic DNS lets peers reach each other by hostname.
dns_config:
  override_local_dns: false
  nameservers:
    - 1.1.1.1
    - 8.8.8.8
  domains: []
  magic_dns: true
  base_domain: "hive.internal"

# Database: SQLite on the named volume so peer registrations survive restarts.
db_type: sqlite3
db_path: /var/lib/headscale/db.sqlite

# Private key for the Headscale node identity (auto-generated on first start).
private_key_path: /var/lib/headscale/private.key

# Noise private key for the Tailscale v2 protocol.
noise:
  private_key_path: /var/lib/headscale/noise_private.key

# ── Embedded DERP relay ────────────────────────────────────────────────────────
# Headscale ships an embedded DERP server.  Enabling it means ALL relay
# coordination and fallback traffic stays on this box.  No external Tailscale
# DERP servers are contacted.
#
# STUN port (udp/3478): NAT discovery.  Open outbound on the host firewall.
# HTTPS/DERP port (tcp/443 via the compose port mapping to 8085 inside):
#   relayed WireGuard packets.  Clients connect outbound; no inbound forward needed.
derp:
  server:
    enabled: true
    region_id: 999
    region_code: "hive"
    region_name: "Hive EnterpriseEdge self-hosted relay"
    stun_listen_addr: "0.0.0.0:3478"
    # HTTPS port the embedded DERP relay listens on inside the container.
    # docker-compose.relay.yml maps host 8085 -> container 8085.
    https_enabled: false
    port: 8085
    private_key_path: /var/lib/headscale/derp_server_private.key
  # No external DERP URLs.  Sovereign: zero relay traffic leaves the box.
  urls: []
  paths: []
  auto_update_enabled: false
  update_frequency: 0

# ── ACL policy file ───────────────────────────────────────────────────────────
# Mounted read-only from deploy/headscale/acls.yaml.
# Default policy: deny-all, then permit only registered client devices that
# the operator explicitly allows.  See acls.yaml for the rule set and comments.
acl_policy_path: /etc/headscale/acls.yaml

# ── Logging ───────────────────────────────────────────────────────────────────
log:
  format: text
  level: info

# ── Ephemeral node cleanup ────────────────────────────────────────────────────
# Nodes that go offline for longer than this duration are expunged from the
# network map, preventing stale records from accumulating.
ephemeral_node_inactivity_timeout: "30m"
