<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hive</title>
  </head>
  <body>
    <main id="app">
      <h1>Hive</h1>
      <p>Enter your organization's Hive server address to continue.</p>
      <form id="server-form" novalidate>
        <label for="server-url">Server URL</label>
        <input
          id="server-url"
          name="server-url"
          type="text"
          placeholder="https://hive.example.com"
          autocomplete="off"
          required
        />
        <button type="submit">Continue</button>
      </form>
      <p id="server-error" role="alert" hidden></p>

      <section aria-label="Start a local task">
        <h2>Run a task locally</h2>
        <p>
          Runs sandboxed on this machine and never syncs to the cloud task
          list. To run a task on the server instead, continue to the console
          above.
        </p>
        <form id="local-task-form" novalidate>
          <label for="local-task-pack">Pack</label>
          <select id="local-task-pack" name="local-task-pack"></select>
          <label for="local-task-instructions">Instructions</label>
          <textarea
            id="local-task-instructions"
            name="local-task-instructions"
            placeholder="What should this task do?"
          ></textarea>
          <button type="submit">Run locally</button>
        </form>
        <p id="local-task-error" role="alert" hidden></p>
        <ul id="local-task-list" aria-label="Local tasks"></ul>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
