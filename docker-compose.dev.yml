services:
  api:
    command: ["pnpm", "--filter", "@hive/api", "dev"]
    environment:
      WEB_INTERNAL_GUEST_TOKEN: ${WEB_INTERNAL_GUEST_TOKEN:-dev-web-guest-token}
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/apps/web/node_modules
      - /app/packages/shared/node_modules

  web:
    command: ["pnpm", "--filter", "@hive/web", "dev", "--", "--hostname", "0.0.0.0", "--port", "3000"]
    environment:
      WEB_INTERNAL_GUEST_TOKEN: ${WEB_INTERNAL_GUEST_TOKEN:-dev-web-guest-token}
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/apps/web/node_modules
      - /app/packages/shared/node_modules
