services:
  api:
    command:
      - sh
      - -c
      - |
        echo "api git-commit: $(git -C /app rev-parse HEAD 2>/dev/null || echo unknown)"
        exec pnpm --filter @hive/api dev
    environment:
      WEB_INTERNAL_GUEST_TOKEN: ${WEB_INTERNAL_GUEST_TOKEN:-dev-web-guest-token}
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/apps/web/node_modules
      - /app/packages/shared/node_modules

  web:
    command:
      - sh
      - -c
      - |
        echo "web git-commit: $(git -C /app rev-parse HEAD 2>/dev/null || echo unknown)"
        exec pnpm --filter @hive/web dev --hostname 0.0.0.0 --port 3000
    environment:
      NODE_ENV: development
      WEB_INTERNAL_GUEST_TOKEN: ${WEB_INTERNAL_GUEST_TOKEN:-dev-web-guest-token}
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/apps/web/node_modules
      - /app/packages/shared/node_modules
